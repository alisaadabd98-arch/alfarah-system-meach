        // ==================== Houses View ====================
        function HousesView({ zoneData, block, department, task, currentUser, onBack }) {
            const houses = Array.from({ length: block.houses }, (_, i) => i + 1);
            const [statuses, setStatuses] = useState(() => {
                const init = {};
                houses.forEach(h => { init[h] = dataManager.getStatus(block.number, h, department, task.id); });
                return init;
            });
            const [saveStates, setSaveStates] = useState({});
            const [lastSync, setLastSync] = useState(null);

            // polling كل 20 ثانية لجلب التحديثات من Firebase
            useEffect(() => {
                const poll = async () => {
                    try {
                        const cloudData = await cloudSync.fbGet(`alfarah_mech/zone${zoneData.id}`);
                        if (cloudData && cloudData.data) {
                            // تحديث localStorage
                            localStorage.setItem(`mech_zone${zoneData.id}_data_v2`, JSON.stringify(cloudData.data));
                            if (cloudData.editTimes) {
                                localStorage.setItem(`mech_zone${zoneData.id}_edit_times`, JSON.stringify(cloudData.editTimes));
                                dataManager.editTimes = cloudData.editTimes;
                            }
                            dataManager.data = cloudData.data;
                            // تحديث الواجهة
                            const updated = {};
                            houses.forEach(h => { updated[h] = dataManager.getStatus(block.number, h, department, task.id); });
                            setStatuses(updated);
                            setLastSync(new Date().toLocaleTimeString('en-GB'));
                        }
                    } catch(e) {}
                };
                poll(); // جلب فوري عند الفتح
                const interval = setInterval(poll, 20000);
                return () => clearInterval(interval);
            }, []);

            const getStatusColor = (s) => s === 'completed' ? '#10b981' : s === 'in-progress' ? '#f59e0b' : '#dc2626';
            const cycleStatus = (s) => s === 'not-started' ? 'in-progress' : s === 'in-progress' ? 'completed' : 'not-started';

            const handleHouseClick = async (houseNum) => {
                // فقط admin, manager, foreman يقدرون يعدلون
                if (currentUser.role !== 'admin' && currentUser.role !== 'manager' && currentUser.role !== 'foreman') {
                    return;
                }
                const currentStatus = statuses[houseNum] || 'not-started';
                const newStatus = cycleStatus(currentStatus);
                const result = dataManager.updateStatus(block.number, houseNum, department, task.id, newStatus, currentUser.name, currentUser.role);
                if (result === 'approval-needed') {
                    const oldLabel = currentStatus==='completed'?'منجز':currentStatus==='in-progress'?'قيد الإنجاز':'لم يبدأ';
                    const newLabel = newStatus==='completed'?'منجز':newStatus==='in-progress'?'قيد الإنجاز':'لم يبدأ';
                    alert(`⚠️ تم إرسال طلب الموافقة\n\nBlock ${block.number} - House ${houseNum}\n${oldLabel} ← ${newLabel}\n\nالتراجع يحتاج موافقة مدير النظام`);
                } else if (result === 'success' || result === 'updated' || result) {
                    setStatuses(prev => ({ ...prev, [houseNum]: newStatus }));
                    setSaveStates(prev => ({ ...prev, [houseNum]: 'saving' }));
                    try {
                        const p = dataManager.saveData();
                        if (p && typeof p.then === 'function') await p;
                        setSaveStates(prev => ({ ...prev, [houseNum]: 'saved' }));
                        setTimeout(() => setSaveStates(prev => ({ ...prev, [houseNum]: null })), 2500);
                    } catch(e) {
                        setSaveStates(prev => ({ ...prev, [houseNum]: 'error' }));
                        setTimeout(() => setSaveStates(prev => ({ ...prev, [houseNum]: null })), 3000);
                    }
                }
            };

            return (
                <div>
                    <div className="mb-8 flex items-center justify-between">
                        <button onClick={onBack} className="px-6 py-3 bg-gray-700 text-white rounded-lg hover:bg-gray-600 transition-all flex items-center gap-2 font-semibold">
                            <span>←</span><span>رجوع</span>
                        </button>
                        {lastSync && (
                            <span className="text-gray-500 text-xs">🔄 آخر مزامنة: {lastSync}</span>
                        )}
                    </div>
                    <div className="mb-8 bg-gray-800 p-6 rounded-xl border-r-4 border-blue-500">
                        <div className="flex items-center justify-between mb-4">
                            <div><h2 className="text-3xl font-bold text-white mb-2">بلوك {block.number}</h2><p className="text-gray-300">{task.name}</p></div>
                            <div className="text-5xl">🏗️</div>
                        </div>
                        <div className="bg-gray-700 p-4 rounded-lg">
                            <div className="flex items-center gap-4 text-sm">
                                {[['#dc2626','لم يبدأ'],['#f59e0b','قيد الإنجاز'],['#10b981','منجز']].map(([c,l]) => (
                                    <div key={l} className="flex items-center gap-2">
                                        <div className="w-4 h-4 rounded" style={{backgroundColor:c}}></div>
                                        <span className="text-gray-300">{l}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-4 md:grid-cols-8 lg:grid-cols-10 gap-3">
                        {houses.map(houseNum => {
                            const status = statuses[houseNum] || 'not-started';
                            const saveState = saveStates[houseNum];
                            const houseType = getHouseType(zoneData.id, block.number, houseNum);
                            const hasClientRequest = houseHasRequest(zoneData.id, block.number, houseNum);
                            return (
                                <div key={houseNum} className="text-center">
                                    <button onClick={() => handleHouseClick(houseNum)} className="house-box"
                                        style={{ backgroundColor: getStatusColor(status), position: 'relative' }}
                                        disabled={currentUser.role !== 'admin' && currentUser.role !== 'manager' && currentUser.role !== 'foreman'}>
                                        {houseNum}
                                        {hasClientRequest && (
                                            <span style={{
                                                position: 'absolute', top: '-5px', right: '-5px',
                                                width: '12px', height: '12px', backgroundColor: '#ef4444',
                                                borderRadius: '50%', border: '2px solid #1f2937',
                                                display: 'block'
                                            }}/>
                                        )}
                                        {saveState === 'saving' && <span style={{position:'absolute',top:3,left:3,width:10,height:10,borderRadius:'50%',border:'2px solid rgba(255,255,255,0.9)',borderTopColor:'transparent',display:'inline-block',animation:'spin 0.7s linear infinite'}}/>}
                                        {saveState === 'saved' && <span style={{position:'absolute',top:3,left:3,width:10,height:10,borderRadius:'50%',backgroundColor:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#10b981',fontWeight:'bold'}}>✓</span>}
                                        {saveState === 'error' && <span style={{position:'absolute',top:3,left:3,width:10,height:10,borderRadius:'50%',backgroundColor:'#ef4444',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#fff',fontWeight:'bold'}}>!</span>}
                                    </button>
                                    <div className="text-xs text-gray-400 mt-1">{houseType}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ==================== Search Modal ====================
        function SearchModal({ zoneData, onClose }) {
            const [selectedBlock, setSelectedBlock] = useState('');
            const [houseNumber, setHouseNumber] = useState('');
            const [searchResult, setSearchResult] = useState(null);

            const handleSearch = () => {
                if (!selectedBlock || !houseNumber) {
                    alert('الرجاء اختيار البلوك ورقم البيت');
                    return;
                }

                const blockNum = parseInt(selectedBlock);
                const houseNum = parseInt(houseNumber);
                const block = zoneData.blocks.find(b => b.number === blockNum);

                if (!block || houseNum < 1 || houseNum > block.houses) {
                    alert('رقم البيت غير صحيح');
                    return;
                }

                const houseType = getHouseType(zoneData.id, blockNum, houseNum);

                const result = {
                    block: blockNum,
                    house: houseNum,
                    type: houseType,
                    details: {}
                };

                Object.entries(zoneData.departments).forEach(([deptKey, dept]) => {
                    result.details[deptKey] = {
                        name: dept.name,
                        icon: dept.icon,
                        tasks: []
                    };

                    dept.tasks.forEach(task => {
                        result.details[deptKey].tasks.push({
                            name: task.name,
                            status: dataManager.getStatus(blockNum, houseNum, deptKey, task.id)
                        });
                    });
                });

                setSearchResult(result);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">

                                        value={selectedBlock}

                                    >
                                        <option value="">اختر البلوك</option>

                                            <option key={block.id} value={block.number}>

                                style={{ backgroundColor: 'var(--primary-gold)' }}

                                بحث
                            </button>

                            {searchResult && (
                                <div className="bg-gray-700 p-6 rounded-lg">
                                    <div className="mb-6">
                                        <h4 className="text-2xl font-bold text-white mb-2">
                                            بلوك {searchResult.block} - بيت {searchResult.house}
                                        </h4>
                                        <p className="text-gray-300">نوع: {searchResult.type}</p>
                                    </div>

                                    {Object.entries(searchResult.details).map(([deptKey, dept]) => (
                                        <div key={deptKey} className="mb-6">
                                            <h5 className="text-xl font-bold text-white mb-3 flex items-center gap-2">
                                                {dept.icon} {dept.name}

                                                    <div key={idx} className="flex items-center justify-between bg-gray-600 p-3 rounded">

                                                        <span className={`font-bold ${
                                                            task.status === 'completed' ? 'text-green-400' :
                                                            task.status === 'in-progress' ? 'text-yellow-400' :
                                                            'text-red-400'
                                                        }`}>
                                                            {task.status === 'completed' ? '✅ منجز' :

                                                             '🔴 لم يبدأ'}

        // ==================== Report Modal ====================
        function ReportModal({ currentUser, onClose }) {
            const [allReports, setAllReports] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [viewingReport, setViewingReport] = useState(null);

            const canSeeReports = currentUser.role === 'admin' || currentUser.role === 'manager';

            useEffect(() => {
                if (canSeeReports) loadAllReports();
            }, []);

            // ---- تحميل كل التقارير من localStorage والسحابة ----
            const loadAllReports = async () => {
                setIsLoading(true);
                const reports = []; const seen = new Set();
                for (const z of [1, 2, 5]) {
                    try {
                        const raw = localStorage.getItem(`mech_zone${z}_report_history`);
                        if (raw) for (const r of JSON.parse(raw)) {
                            const k = r.submittedAt || (r.date + r.zoneName);
                            if (!seen.has(k)) { seen.add(k); reports.push(r); }
                        }
                    } catch(e) {}
                }
                try {
                    const cd = await cloudSync.syncData();
                    if (cd?.reports) {
                        const arr = Array.isArray(cd.reports) ? cd.reports : Object.values(cd.reports);
                        for (const r of arr) {
                            if (!r) continue;
                            const k = r.submittedAt || (r.date + r.zoneName);
                            if (!seen.has(k)) { seen.add(k); reports.push(r); }
                        }
                    }
                } catch(e) {}
                reports.sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
                setAllReports(reports);
                setIsLoading(false);
            };

            // ---- إنشاء تقرير يدوي ----
            const createManualReport = () => {
                // يجلب تلقائياً التغييرات منذ آخر تقرير
                dataManager.submitReport({
                    workers: 0, technicians: 0,
                    preparedBy: currentUser.name,
                    notes: ''
                });
                loadAllReports();
                alert('✅ تم إنشاء التقرير بنجاح!\nيحتوي على التحديثات الجديدة فقط.');
            };

            const sLabel = (ns) => ns === 'completed' ? 'منجز' : ns === 'in-progress' ? 'قيد الإنجاز' : 'لم يبدأ';
            const sColor = (ns) => ns === 'completed' ? '#16a34a' : ns === 'in-progress' ? '#d97706' : '#dc2626';

            // ---- طباعة التقرير ----
            const printReport = (report) => {
                const changes = report.changes || [];
                const pw = window.open('', '_blank');
                const rows = changes.map((c, i) => {
                    const status = c.newStatus || c.newStatusText || '';
                    const color = sColor(status);
                    const taskName = c.task || c.taskName || '';
                    return `<tr>
                        <td>${i+1}</td>
                        <td>بلوك ${c.block}</td>
                        <td>بيت ${c.house}</td>
                        <td>${taskName}</td>
                        <td style="color:${color};font-weight:bold">${sLabel(status)}</td>
                    </tr>`;
                }).join('');

                pw.document.write(`<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقرير اليومي - ${report.date}</title>
<style>
    @page { size: A4; margin: 20mm; }
    body { font-family: Arial, sans-serif; direction: rtl; color: #000; font-size: 13px; }
    .header { text-align: center; border-bottom: 3px solid #C9A961; padding-bottom: 14px; margin-bottom: 16px; }
    .header h1 { font-size: 22px; color: #C9A961; margin: 0 0 4px; }
    .header h2 { font-size: 14px; color: #555; margin: 0; font-weight: normal; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .meta-item { background: #f5f0e8; padding: 5px 12px; border-radius: 6px; font-size: 12px; }
    .meta-item strong { color: #333; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #1a3a52; color: #fff; padding: 9px 7px; text-align: right; }
    tbody td { padding: 7px; border-bottom: 1px solid #eee; }
    tbody tr:nth-child(even) { background: #fafafa; }
    .empty { text-align: center; color: #888; padding: 20px; }
    .footer { margin-top: 40px; display: flex; justify-content: space-between; }
    .sign { border-top: 1px solid #999; width: 180px; padding-top: 6px; text-align: center; font-size: 12px; color: #555; }
    .total { margin-top: 12px; text-align: left; font-size: 12px; color: #555; }
</style>
</head>
<body>
<div class="header">
    <h1>⚡ قسم الكهرباء</h1>
    <h2>التقرير اليومي للأعمال</h2>
</div>
<div class="meta">
    <div class="meta-item"><strong>📅 التاريخ:</strong> ${report.date || ''}</div>
    <div class="meta-item"><strong>⏰ الوقت:</strong> ${report.time || ''}</div>
    <div class="meta-item"><strong>👤 أعده:</strong> ${report.preparedBy || ''}</div>
    <div class="meta-item"><strong>🏗️ الزون:</strong> ${report.zoneName || ''}</div>
</div>
<table>
    <thead>
        <tr>
            <th>#</th>
            <th>البلوك</th>
            <th>البيت</th>
            <th>المهمة</th>
            <th>الحالة</th>
        </tr>
    </thead>
    <tbody>
        ${rows || '<tr><td colspan="5" class="empty">لا توجد تغييرات اليوم</td></tr>'}
    </tbody>
</table>
<div class="total">إجمالي التغييرات: <strong>${changes.length}</strong></div>
<div class="footer">
    <div class="sign">توقيع مهندس الموقع<br><br>${report.preparedBy || ''}</div>
    <div class="sign">توقيع مدير المشروع<br><br></div>
</div>
</body>
</html>`);
                pw.document.close();
                setTimeout(() => pw.print(), 400);
            };

            // ---- عرض تقرير واحد ----
            if (viewingReport) {
                const changes = viewingReport.changes || [];
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
                        <div className="bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                            <div className="sticky top-0 bg-gray-800 p-4 border-b border-gray-700 flex items-center justify-between">
                                <div>
                                    <h3 className="text-lg font-bold text-white">📋 {viewingReport.date}</h3>
                                    <p className="text-gray-400 text-sm">{viewingReport.zoneName} | {viewingReport.preparedBy}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => printReport(viewingReport)}
                                        className="px-4 py-2 rounded-lg font-bold text-gray-900 text-sm"
                                        style={{backgroundColor:'var(--primary-gold)'}}>
                                        🖨️ طباعة
                                    </button>
                                    <button onClick={() => setViewingReport(null)} className="text-white text-2xl hover:text-red-500 leading-none">×</button>
                                </div>
                            </div>
                            <div className="p-4">
                                {changes.length === 0 ? (
                                    <div className="text-center py-10 text-gray-400">لا توجد تغييرات في هذا التقرير</div>
                                ) : (
                                    <div className="space-y-2">
                                        {changes.map((c, i) => (
                                            <div key={i} className="bg-gray-700 p-3 rounded-lg flex items-center justify-between text-sm">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-gray-400 text-xs w-5">{i+1}</span>
                                                    <div>
                                                        <span className="text-white font-bold">بلوك {c.block} - بيت {c.house}</span>
                                                        <span className="text-gray-400 mx-2">|</span>
                                                        <span className="text-gray-300">{c.task || c.taskName || ''}</span>
                                                    </div>
                                                </div>
                                                <span className="font-bold text-sm px-2 py-1 rounded" style={{
                                                    backgroundColor: (c.newStatus||c.newStatusText)==='completed'?'#14532d':(c.newStatus||c.newStatusText)==='in-progress'?'#78350f':'#7f1d1d',
                                                    color: (c.newStatus||c.newStatusText)==='completed'?'#4ade80':(c.newStatus||c.newStatusText)==='in-progress'?'#fbbf24':'#f87171'
                                                }}>
                                                    {sLabel(c.newStatus||c.newStatusText||'')}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="mt-4 text-gray-400 text-sm text-left">
                                    إجمالي التغييرات: <strong className="text-white">{changes.length}</strong>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ---- الشاشة الرئيسية للتقارير ----
            const today = new Date().toLocaleDateString('en-GB');
            const todayReports = allReports.filter(r => r.date === today);
            const pastReports = allReports.filter(r => r.date !== today);

            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
                    <div className="bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-gray-800 p-5 border-b border-gray-700 flex items-center justify-between">
                            <div>
                                <h3 className="text-xl font-bold text-white">📊 التقارير اليومية</h3>
                                <p className="text-gray-400 text-sm mt-1">الأعمال الكهربائية</p>
                            </div>
                            <button onClick={onClose} className="text-white text-3xl hover:text-red-500">×</button>
                        </div>

                        <div className="p-5 space-y-4">
                            {/* زر إنشاء تقرير يدوي */}
                            {canSeeReports && (
                                <button onClick={createManualReport}
                                    className="w-full py-3 rounded-xl font-bold text-gray-900 flex items-center justify-center gap-2"
                                    style={{backgroundColor:'var(--primary-gold)'}}>
                                    📋 إنشاء تقرير الآن
                                </button>
                            )}

                            {/* تقارير اليوم */}
                            <div>
                                <h4 className="text-white font-bold mb-3">📅 تقارير اليوم</h4>
                                {isLoading ? (
                                    <div className="text-center py-6 text-gray-400">جاري التحميل...</div>
                                ) : todayReports.length === 0 ? (
                                    <div className="bg-gray-700 rounded-xl p-6 text-center">
                                        <div className="text-4xl mb-2">📭</div>
                                        <p className="text-gray-400">لا توجد تقارير اليوم</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {todayReports.map((report, i) => (
                                            <div key={i} className="bg-gray-700 p-4 rounded-xl flex items-center justify-between">
                                                <div>
                                                    <div className="font-bold text-white">{report.preparedBy}</div>
                                                    <div className="text-sm text-gray-400">{report.zoneName} | ⏰ {report.time} | 📈 {(report.changes||[]).length} تغيير</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setViewingReport(report)}
                                                        className="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold">
                                                        👁️ عرض
                                                    </button>
                                                    <button onClick={() => printReport(report)}
                                                        className="px-3 py-2 rounded-lg text-sm font-bold text-gray-900"
                                                        style={{backgroundColor:'var(--primary-gold)'}}>
                                                        🖨️
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* تقارير سابقة */}
                            {pastReports.length > 0 && (
                                <div>
                                    <h4 className="text-white font-bold mb-3">🗃️ تقارير سابقة ({pastReports.length})</h4>
                                    <div className="space-y-2 max-h-64 overflow-y-auto">
                                        {pastReports.map((report, i) => (
                                            <div key={i} className="bg-gray-700 p-3 rounded-lg flex items-center justify-between">
                                                <div>
                                                    <span className="font-bold text-white">{report.date}</span>
                                                    <span className="text-gray-400 text-sm mx-2">|</span>
                                                    <span className="text-gray-300 text-sm">{report.preparedBy} - {report.zoneName}</span>
                                                    <span className="text-gray-500 text-sm mx-2">({(report.changes||[]).length} تغيير)</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setViewingReport(report)}
                                                        className="px-3 py-1 bg-blue-600 text-white rounded text-sm">👁️</button>
                                                    <button onClick={() => printReport(report)}
                                                        className="px-3 py-1 bg-gray-500 text-white rounded text-sm">🖨️</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== Approval Modal ====================
        function ApprovalModal({ currentUser, onClose }) {
            const [requests, setRequests] = useState([]);
            const [refreshKey, setRefreshKey] = useState(0);
            const [loadingId, setLoadingId] = useState(null); // id الطلب الذي يُعالج حالياً

            useEffect(() => {
                loadRequests();
            }, [refreshKey]);

            // polling كل 15 ثانية للطلبات الجديدة
            useEffect(() => {
                const poll = async () => {
                    try {
                        const data = await cloudSync.fbGet('alfarah_mech/approval_requests');
                        if (data) {
                            const arr = Array.isArray(data) ? data : Object.values(data);
                            const valid = arr.filter(r => r && r.id);
                            if (valid.length > 0) {
                                localStorage.setItem('mech_approval_requests', JSON.stringify(valid));
                                setRefreshKey(prev => prev + 1);
                            }
                        }
                    } catch(e) {}
                };
                const interval = setInterval(poll, 15000);
                return () => clearInterval(interval);
            }, []);

            const loadRequests = () => {
                const allReqs = JSON.parse(localStorage.getItem('mech_approval_requests') || '[]');
                if (currentUser.role === 'admin' || currentUser.role === 'manager') {
                    setRequests(allReqs.filter(r => r.status === 'pending'));
                } else {
                    setRequests(allReqs.filter(r => r.username === currentUser.name));
                }
            };

            const handleApprove = async (requestId) => {
                if (!confirm('هل تريد الموافقة على هذا الطلب؟')) return;
                setLoadingId(requestId);
                try {
                    const success = dataManager.approveRequest(requestId);
                    if (success) {
                        setRefreshKey(prev => prev + 1);
                        alert('✅ تمت الموافقة وتطبيق التغيير');
                    } else {
                        alert('❌ حدث خطأ في الموافقة');
                    }
                } catch(e) {
                    alert('❌ حدث خطأ: ' + e.message);
                } finally {
                    setLoadingId(null);
                }
            };

            const handleReject = async (requestId) => {
                if (!confirm('هل تريد رفض هذا الطلب؟')) return;
                setLoadingId(requestId);
                try {
                    const success = dataManager.rejectRequest(requestId, '');
                    if (success) {
                        // مزامنة مع السحابة والانتظار
                        await dataManager.saveData();
                        setRefreshKey(prev => prev + 1);
                    } else {
                        alert('❌ حدث خطأ في الرفض');
                    }
                } catch(e) {
                    alert('❌ حدث خطأ أثناء المزامنة');
                } finally {
                    setLoadingId(null);
                }
            };

            const getStatusBadge = (status) => {
                if (status === 'pending') {
                    return <span className="px-3 py-1 bg-yellow-600 text-white rounded-full text-sm">⏳ قيد الانتظار</span>;
                } else if (status === 'approved') {
                    return <span className="px-3 py-1 bg-green-600 text-white rounded-full text-sm">✅ تمت الموافقة</span>;
                } else {
                    return <span className="px-3 py-1 bg-red-600 text-white rounded-full text-sm">❌ مرفوض</span>;
                }
            };

            const Spinner = () => (
                <span style={{
                    display: 'inline-block', width: 18, height: 18,
                    border: '2.5px solid rgba(255,255,255,0.3)',
                    borderTopColor: '#fff',
                    borderRadius: '50%',
                    animation: 'spin 0.7s linear infinite',
                    verticalAlign: 'middle'
                }} />
            );

            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
                    <div className="bg-gray-800 rounded-lg max-w-6xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-gray-800 p-6 border-b border-gray-700 flex items-center justify-between">
                            <div>
                                <h3 className="text-2xl font-bold text-white">
                                    {currentUser.role === 'admin' ? '✋ طلبات الموافقة' : '📝 طلباتي'}
                                </h3>
                                {currentUser.role === 'admin' && (
                                    <p className="text-gray-400 text-sm mt-1">
                                        {requests.length} طلب قيد الانتظار
                                    </p>
                                )}
                            </div>
                            <button onClick={onClose} className="text-white text-3xl hover:text-red-500 transition">×</button>
                        </div>

                        <div className="p-6">
                            {requests.length === 0 ? (
                                <div className="text-center py-12">
                                    <div className="text-6xl mb-4">
                                        {currentUser.role === 'admin' ? '✅' : '📭'}
                                    </div>
                                    <p className="text-gray-400 text-lg">
                                        {currentUser.role === 'admin'
                                            ? 'لا توجد طلبات موافقة قيد الانتظار'
                                            : 'لا توجد طلبات مرسلة'
                                        }
                                    </p>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {requests.map((request) => {
                                        const isLoading = loadingId === request.id;
                                        return (
                                            <div key={request.id} className="bg-gray-700 p-6 rounded-lg">
                                                <div className="flex items-start justify-between mb-4">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-3 mb-2">
                                                            <h4 className="text-xl font-bold text-white">
                                                                {request.zoneName} - بلوك {request.block} - بيت {request.house}
                                                            </h4>
                                                            {getStatusBadge(request.status)}
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-2 text-sm text-gray-300 mb-3">
                                                            <div>📅 {request.timestampDisplay}</div>
                                                            <div>👤 {request.username}</div>
                                                            <div>📂 {request.departmentName}</div>
                                                            <div>🔧 {request.taskName}</div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-gray-600 p-4 rounded-lg mb-4">
                                                    <div className="flex items-center justify-center gap-8">
                                                        <div className="text-center">
                                                            <div className="text-sm text-gray-400 mb-1">الحالة السابقة</div>
                                                            <div className={`text-lg font-bold ${
                                                                request.oldStatus === 'completed' ? 'text-green-400' :
                                                                request.oldStatus === 'in-progress' ? 'text-yellow-400' :
                                                                'text-red-400'
                                                            }`}>{request.oldStatusText}</div>
                                                        </div>
                                                        <div className="text-3xl">→</div>
                                                        <div className="text-center">
                                                            <div className="text-sm text-gray-400 mb-1">الحالة الجديدة</div>
                                                            <div className={`text-lg font-bold ${
                                                                request.newStatus === 'completed' ? 'text-green-400' :
                                                                request.newStatus === 'in-progress' ? 'text-yellow-400' :
                                                                'text-red-400'
                                                            }`}>{request.newStatusText}</div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {currentUser.role === 'admin' && request.status === 'pending' && (
                                                    <div className="flex gap-3">
                                                        <button
                                                            onClick={() => handleApprove(request.id)}
                                                            disabled={isLoading}
                                                            className="flex-1 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-bold flex items-center justify-center gap-2 disabled:opacity-60"
                                                        >
                                                            {isLoading ? <Spinner /> : '✅'} موافقة
                                                        </button>
                                                        <button
                                                            onClick={() => handleReject(request.id)}
                                                            disabled={isLoading}
                                                            className="flex-1 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-bold flex items-center justify-center gap-2 disabled:opacity-60"
                                                        >
                                                            {isLoading ? <Spinner /> : '❌'} رفض
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== User Management Modal ====================
        function UserManagementModal({ currentUser, onClose }) {
            const [showAddUser, setShowAddUser] = useState(false);
            const [showChangePassword, setShowChangePassword] = useState(null);

            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
                    <div className="bg-gray-800 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-gray-800 p-6 border-b border-gray-700 flex items-center justify-between">
                            <h3 className="text-2xl font-bold text-white">👤 إدارة الحسابات</h3>

                                ×
                            </button>

                            <div className="mb-6">
                                <div className="bg-gray-700 p-4 rounded-lg mb-4">
                                    <h4 className="text-white font-bold mb-2">المستخدم الحالي</h4>
                                    <p className="text-gray-300">الاسم: {currentUser.name}</p>
                                    <p className="text-gray-300">
                                        الصلاحية: {
                                            currentUser.role === 'admin' ? 'مدير النظام' :
                                            currentUser.role === 'manager' ? 'مدير المشروع' :
                                            currentUser.role === 'foreman' ? 'فورمن' :
                                            'مستخدم'
                                        }
                                    </p>
                                </div>

                                {(currentUser.role === 'admin' || currentUser.role === 'manager') && (
                                    <>
                                        <button
                                            onClick={() => setShowAddUser(true)}
                                            className="w-full py-3 rounded-lg font-bold text-gray-900 mb-4"
                                            style={{ backgroundColor: 'var(--primary-gold)' }}
                                        >
                                            ➕ إضافة مستخدم جديد
                                        </button>

                                        <div className="space-y-3">
                                            <h4 className="text-white font-bold mb-3">المستخدمون</h4>
                                            {userManager.getVisibleUsers().map(user => (
                                                <div key={user.id} className="bg-gray-700 p-4 rounded-lg">

        // ==================== Zone Management Modal (مدير المشروع) ====================
        function ZoneManagementModal({ onClose }) {
            const [dynamicZones, setDynamicZones] = useState(loadDynamicZones());
            const [selectedZone, setSelectedZone] = useState(null);
            const [addBlockMode, setAddBlockMode] = useState(false);
            const [refreshKey, setRefreshKey] = useState(0);

            // حالة نموذج إضافة البلوك
            const emptyType = { type: '', from: '', to: '', houses: '' };
            const [newBlockHousesTotal, setNewBlockHousesTotal] = useState('');
            const [houseTypes, setHouseTypes] = useState([{ ...emptyType }]);
            const [singleType, setSingleType] = useState(true); // نوع واحد أم متعدد

            const manageableZones = [
                { id: 3, name: 'الزون الثالث', color: '#9333ea' },
                { id: 4, name: 'الزون الرابع', color: '#ea580c' },
                { id: 1, name: 'الزون الأول', color: '#2563eb' },
                { id: 2, name: 'الزون الثاني', color: '#16a34a' },
                { id: 5, name: 'الزون الخامس', color: '#dc2626' },
            ];

            const resetForm = () => {
                setNewBlockHousesTotal('');
                setHouseTypes([{ ...emptyType }]);
                setSingleType(true);
                setAddBlockMode(false);
            };

            const reload = () => {
                setDynamicZones(loadDynamicZones());
                setRefreshKey(k => k + 1);
            };

            const ensureZoneExists = (zoneId, zoneName, zoneColor) => {
                const dz = loadDynamicZones();
                if (!dz[zoneId]) {
                    dz[zoneId] = {
                        id: zoneId, name: zoneName, color: zoneColor,
                        active: true, totalHouses: 0, blocks: [],
                        departments: JSON.parse(JSON.stringify(DEPARTMENTS_TEMPLATE))
                    };
                    saveDynamicZones(dz);
                }
                return dz;
            };

            const updateHouseType = (idx, field, val) => {
                setHouseTypes(prev => prev.map((t, i) => i === idx ? { ...t, [field]: val } : t));
            };

            const addHouseType = () => setHouseTypes(prev => [...prev, { ...emptyType }]);
            const removeHouseType = (idx) => setHouseTypes(prev => prev.filter((_, i) => i !== idx));

            const addBlock = (zoneInfo) => {
                const total = parseInt(newBlockHousesTotal);
                if (!total || total < 1) { alert('أدخل إجمالي عدد الدور'); return; }

                let types = [];
                if (singleType) {
                    // نوع واحد يغطي كل الدور
                    const typeName = houseTypes[0]?.type?.trim();
                    types = [{ type: typeName || 'غير محدد', from: 1, to: total }];
                } else {
                    // أنواع متعددة - كل نوع يحدد أرقام الدور الخاصة به
                    for (let i = 0; i < houseTypes.length; i++) {
                        const t = houseTypes[i];
                        const typeName = t.type?.trim();
                        if (!typeName) { alert(`أدخل اسم النوع للصف ${i + 1}`); return; }
                        const from = parseInt(t.from);
                        const to = parseInt(t.to);
                        if (!from || !to || from < 1 || to > total || from > to) {
                            alert(`أرقام الدور غير صحيحة في الصف ${i + 1}\nيجب أن تكون بين 1 و ${total}`);
                            return;
                        }
                        types.push({ type: typeName, from, to });
                    }
                    // التحقق من أن جميع الدور مغطاة
                    const covered = new Set();
                    for (const t of types) { for (let n = t.from; n <= t.to; n++) covered.add(n); }
                    if (covered.size !== total) {
                        const missing = [];
                        for (let n = 1; n <= total; n++) { if (!covered.has(n)) missing.push(n); }
                        if (missing.length > 0) {
                            const proceed = confirm(`⚠️ الدور التالية غير مغطاة بأي نوع: ${missing.join(', ')}\n\nهل تريد المتابعة؟`);
                            if (!proceed) return;
                        }
                    }
                }

                const dz = ensureZoneExists(zoneInfo.id, zoneInfo.name, zoneInfo.color);
                const zone = dz[zoneInfo.id];
                const newBlockNumber = (zone.blocks.length > 0 ? Math.max(...zone.blocks.map(b => b.number)) : 0) + 1;
                zone.blocks.push({ id: newBlockNumber, number: newBlockNumber, houses: total, types });
                zone.totalHouses = zone.blocks.reduce((s, b) => s + b.houses, 0);
                dz[zoneInfo.id] = zone;
                saveDynamicZones(dz);
                resetForm();
                reload();
                alert(`✅ تم إضافة البلوك ${newBlockNumber} بـ ${total} دار للزون ${zoneInfo.name}`);
            };

            const deleteBlock = (zoneId, blockNumber) => {
                if (!confirm(`هل تريد حذف البلوك ${blockNumber}؟`)) return;
                const dz = loadDynamicZones();
                if (!dz[zoneId]) return;
                dz[zoneId].blocks = dz[zoneId].blocks.filter(b => b.number !== blockNumber);
                dz[zoneId].blocks = dz[zoneId].blocks.map((b, i) => ({ ...b, id: i+1, number: i+1 }));
                dz[zoneId].totalHouses = dz[zoneId].blocks.reduce((s, b) => s + b.houses, 0);
                saveDynamicZones(dz);
                reload();
            };

            const currentZoneInfo = selectedZone ? manageableZones.find(z => z.id === selectedZone) : null;
            const currentZoneData = selectedZone ? (loadDynamicZones()[selectedZone] || ZONES_DATA[selectedZone]) : null;

            // شاشة تفاصيل الزون
            if (selectedZone && currentZoneInfo) {
                const isStaticZone = !!ZONES_DATA[selectedZone];
                const totalHouses = parseInt(newBlockHousesTotal) || 0;
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
                        <div className="bg-gray-800 rounded-xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
                            <div className="sticky top-0 bg-gray-800 p-5 border-b border-gray-700 flex items-center justify-between">
                                <div>
                                    <h3 className="text-xl font-bold text-white flex items-center gap-2">
                                        <span style={{width:14,height:14,borderRadius:'50%',background:currentZoneInfo.color,display:'inline-block'}}></span>
                                        {currentZoneInfo.name}
                                    </h3>
                                    <p className="text-gray-400 text-sm mt-1">
                                        {currentZoneData?.blocks?.length || 0} بلوك | {currentZoneData?.totalHouses || 0} دار
                                    </p>
                                </div>
                                <button onClick={() => { setSelectedZone(null); resetForm(); }} className="text-white text-3xl hover:text-red-500">×</button>
                            </div>
                            <div className="p-5 space-y-4">
                                {!addBlockMode && (
                                    <button
                                        onClick={() => setAddBlockMode(true)}
                                        className="w-full py-3 rounded-lg font-bold text-gray-900 flex items-center justify-center gap-2"
                                        style={{backgroundColor:'var(--primary-gold)'}}
                                    >
                                        ➕ إضافة بلوك جديد
                                    </button>
                                )}

                                {addBlockMode && (
                                    <div className="bg-gray-700 p-4 rounded-lg space-y-4">
                                        <h4 className="text-white font-bold text-lg">➕ بلوك جديد</h4>

                                        {/* إجمالي عدد الدور */}
                                        <div>
                                            <label className="text-gray-300 text-sm block mb-1">إجمالي عدد الدور في البلوك <span className="text-red-400">*</span></label>
                                            <input
                                                type="number" min="1"
                                                value={newBlockHousesTotal}
                                                onChange={e => setNewBlockHousesTotal(e.target.value)}
                                                className="w-full px-3 py-2 bg-gray-600 text-white rounded-lg text-center text-lg font-bold"
                                                placeholder="مثال: 24"
                                            />
                                        </div>

                                        {/* خيار نوع واحد أم متعدد */}
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => { setSingleType(true); setHouseTypes([{ ...emptyType }]); }}
                                                className="flex-1 py-2 rounded-lg text-sm font-bold transition"
                                                style={singleType ? {backgroundColor:'var(--primary-gold)',color:'#111'} : {backgroundColor:'#4b5563',color:'#fff'}}
                                            >نوع واحد</button>
                                            <button
                                                onClick={() => { setSingleType(false); setHouseTypes([{ ...emptyType }, { ...emptyType }]); }}
                                                className="flex-1 py-2 rounded-lg text-sm font-bold transition"
                                                style={!singleType ? {backgroundColor:'var(--primary-gold)',color:'#111'} : {backgroundColor:'#4b5563',color:'#fff'}}
                                            >أنواع متعددة</button>
                                        </div>

                                        {/* نوع واحد */}
                                        {singleType && (
                                            <div>
                                                <label className="text-gray-300 text-sm block mb-1">نوع الدار <span className="text-gray-400">(اختياري)</span></label>
                                                <input
                                                    type="text"
                                                    value={houseTypes[0]?.type || ''}
                                                    onChange={e => updateHouseType(0, 'type', e.target.value)}
                                                    className="w-full px-3 py-2 bg-gray-600 text-white rounded-lg"
                                                    placeholder="مثال: VY أو A1 أو فيلا أو أي تسمية..."
                                                />
                                                {totalHouses > 0 && (
                                                    <p className="text-gray-400 text-xs mt-1">سيُطبَّق هذا النوع على جميع الدور من 1 إلى {totalHouses}</p>
                                                )}
                                            </div>
                                        )}

                                        {/* أنواع متعددة */}
                                        {!singleType && (
                                            <div className="space-y-3">
                                                <div className="flex items-center justify-between">
                                                    <label className="text-gray-300 text-sm font-bold">أنواع الدور وأرقامها</label>
                                                    {totalHouses > 0 && <span className="text-gray-400 text-xs">الدور: 1 → {totalHouses}</span>}
                                                </div>
                                                {houseTypes.map((t, idx) => (
                                                    <div key={idx} className="bg-gray-600 p-3 rounded-lg space-y-2">
                                                        <div className="flex items-center justify-between">
                                                            <span className="text-gray-300 text-xs font-bold">النوع {idx + 1}</span>
                                                            {houseTypes.length > 1 && (
                                                                <button onClick={() => removeHouseType(idx)} className="text-red-400 hover:text-red-300 text-sm">✕ حذف</button>
                                                            )}
                                                        </div>
                                                        <div>
                                                            <label className="text-gray-400 text-xs block mb-1">اسم النوع</label>
                                                            <input
                                                                type="text"
                                                                value={t.type}
                                                                onChange={e => updateHouseType(idx, 'type', e.target.value)}
                                                                className="w-full px-3 py-2 bg-gray-500 text-white rounded-lg text-sm"
                                                                placeholder="مثال: VY أو VK أو فيلا..."
                                                            />
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <div className="flex-1">
                                                                <label className="text-gray-400 text-xs block mb-1">من دار رقم</label>
                                                                <input
                                                                    type="number" min="1"
                                                                    value={t.from}
                                                                    onChange={e => updateHouseType(idx, 'from', e.target.value)}
                                                                    className="w-full px-3 py-2 bg-gray-500 text-white rounded-lg text-sm"
                                                                    placeholder="1"
                                                                />
                                                            </div>
                                                            <div className="flex-1">
                                                                <label className="text-gray-400 text-xs block mb-1">إلى دار رقم</label>
                                                                <input
                                                                    type="number" min="1"
                                                                    value={t.to}
                                                                    onChange={e => updateHouseType(idx, 'to', e.target.value)}
                                                                    className="w-full px-3 py-2 bg-gray-500 text-white rounded-lg text-sm"
                                                                    placeholder={totalHouses || '?'}
                                                                />
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                                <button
                                                    onClick={addHouseType}
                                                    className="w-full py-2 border-2 border-dashed border-gray-500 text-gray-400 rounded-lg hover:border-yellow-500 hover:text-yellow-500 transition text-sm"
                                                >
                                                    ➕ إضافة نوع آخر
                                                </button>
                                            </div>
                                        )}

                                        <div className="flex gap-3 pt-2">
                                            <button onClick={resetForm} className="flex-1 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-500">إلغاء</button>
                                            <button onClick={() => addBlock(currentZoneInfo)} className="flex-1 py-3 rounded-lg font-bold text-gray-900" style={{backgroundColor:'var(--primary-gold)'}}>
                                                ✅ إضافة البلوك
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <div className="space-y-2">
                                    <h4 className="text-white font-bold text-sm">البلوكات الحالية</h4>
                                    {(!currentZoneData?.blocks || currentZoneData.blocks.length === 0) ? (
                                        <div className="text-center py-8 text-gray-400">لا توجد بلوكات بعد. اضغط "إضافة بلوك جديد" للبدء</div>
                                    ) : (
                                        currentZoneData.blocks.map(block => (
                                            <div key={block.number} className="bg-gray-700 p-3 rounded-lg">
                                                <div className="flex items-center justify-between mb-2">
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <span className="text-white font-bold">بلوك {block.number}</span>
                                                        <span className="text-gray-400 text-sm">{block.houses} دار</span>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        {!isStaticZone && (
                                                            <button
                                                                onClick={() => deleteBlock(selectedZone, block.number)}
                                                                className="px-2 py-1 bg-red-600 text-white rounded text-sm hover:bg-red-700"
                                                                title="حذف البلوك"
                                                            >🗑️</button>
                                                        )}
                                                        {isStaticZone && (
                                                            <span className="text-gray-500 text-xs italic">ثابت</span>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex flex-wrap gap-1">
                                                    {block.types?.map((t, i) => (
                                                        <span key={i} className="text-xs px-2 py-0.5 rounded" style={{background:'rgba(201,169,97,0.2)',color:'var(--primary-gold)'}}>
                                                            {t.type}{t.from && t.to && t.from !== 1 || t.to !== block.houses ? ` (${t.from}–${t.to})` : ''}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // شاشة قائمة الزونات
            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
                    <div className="bg-gray-800 rounded-xl max-w-md w-full max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-gray-800 p-5 border-b border-gray-700 flex items-center justify-between">
                            <div>
                                <h3 className="text-xl font-bold text-white">🏗️ إدارة الزونات والبلوكات</h3>
                                <p className="text-gray-400 text-sm mt-1">إضافة بلوكات ودور للزونات</p>
                            </div>
                            <button onClick={onClose} className="text-white text-3xl hover:text-red-500">×</button>
                        </div>
                        <div className="p-5 space-y-3">
                            {manageableZones.map(zone => {
                                const zd = dynamicZones[zone.id] || ZONES_DATA[zone.id];
                                const blocksCount = zd?.blocks?.length || 0;
                                const housesCount = zd?.totalHouses || 0;
                                const isNew = !ZONES_DATA[zone.id];
                                return (
                                    <button
                                        key={zone.id}
                                        onClick={() => { setSelectedZone(zone.id); setAddBlockMode(false); }}
                                        className="w-full p-4 rounded-xl text-right flex items-center justify-between hover:opacity-90 transition"
                                        style={{background:'#1f2937', border:`2px solid ${zone.color}40`}}
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold"
                                                style={{background:`${zone.color}30`, border:`2px solid ${zone.color}`}}>
                                                {zone.id}
                                            </div>
                                            <div className="text-right">
                                                <div className="text-white font-bold">{zone.name}</div>
                                                <div className="text-gray-400 text-sm">
                                                    {blocksCount > 0 ? `${blocksCount} بلوك | ${housesCount} دار` : 'لم تُضف بلوكات بعد'}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            {isNew && blocksCount === 0 && (
                                                <span className="text-xs px-2 py-1 rounded-full" style={{background:'rgba(201,169,97,0.2)',color:'var(--primary-gold)'}}>جديد</span>
                                            )}
                                            {blocksCount > 0 && (
                                                <span className="text-xs px-2 py-1 rounded-full bg-green-900 text-green-300">نشط</span>
                                            )}
                                            <span className="text-gray-400 text-xl">←</span>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== Render App ====================
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <!-- ===== PWA Install Banner ===== -->
    <div id="pwa-install-banner" style="display:none;">
        <div class="pwa-icon">AL</div>
        <div class="pwa-text">
            <div class="pwa-title">ثبّت تطبيق ALFARAH</div>
            <div class="pwa-sub" id="pwa-install-hint">اضغط للتثبيت على جهازك</div>
        </div>
        <button class="pwa-btn" id="pwa-install-btn">تثبيت</button>
        <button class="pwa-close" id="pwa-close-btn">×</button>
    </div>

    <!-- ===== Service Worker ===== -->
    <script>
        // ---- Service Worker ----
        const SW_CODE = `
const CACHE = 'alfarah-v1';
const ASSETS = [
    './',
    'https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap',
    'https://unpkg.com/react@18/umd/react.production.min.js',
    'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
    'https://unpkg.com/@babel/standalone/babel.min.js',
    'https://cdn.tailwindcss.com'
];

self.addEventListener('install', e => {
    e.waitUntil(
        caches.open(CACHE).then(c => {
            // Cache main page only (CDN assets may fail due to CORS)
            return c.add('./').catch(() => {});
        })
    );
    self.skipWaiting();
});

self.addEventListener('activate', e => {
    e.waitUntil(
        caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
    );
    self.clients.claim();
});

self.addEventListener('fetch', e => {
    // للـ Firebase - لا نعترضه
    if (e.request.url.includes('firebaseio.com') || 
        e.request.url.includes('googleapis.com/identitytoolkit')) {
        return;
    }
    e.respondWith(
        caches.match(e.request).then(cached => {
            if (cached) return cached;
            return fetch(e.request).then(res => {
                if (res && res.status === 200 && res.type === 'basic') {
                    const clone = res.clone();
                    caches.open(CACHE).then(c => c.put(e.request, clone));
                }
                return res;
            }).catch(() => cached || new Response('offline', {status: 503}));
        })
    );
});
`;

        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([SW_CODE], {type: 'application/javascript'});
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL, {scope: './'})
                .then(reg => console.log('✅ SW registered'))
                .catch(err => console.warn('SW registration failed (normal in some browsers):', err));
        }

        // ---- PWA Install Prompt ----
        let deferredPrompt = null;
        const banner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('pwa-install-btn');
        const closeBtn = document.getElementById('pwa-close-btn');
        const hint = document.getElementById('pwa-install-hint');

        // Android / Chrome - حدث التثبيت التلقائي
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            banner.style.display = 'flex';
            hint.textContent = 'اضغط للتثبيت على جهازك';
        });

        // iOS Safari - عرض تعليمات يدوية
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        if (isIOS && isSafari && !isStandalone) {
            setTimeout(() => {
                banner.style.display = 'flex';
                hint.textContent = 'Share ← Add to Home Screen';
                installBtn.textContent = 'كيف؟';
                installBtn.onclick = () => {
                    alert('لتثبيت التطبيق على iPhone:\n\n1️⃣ اضغط على زر المشاركة ↑ أسفل الشاشة\n2️⃣ اختر "Add to Home Screen"\n3️⃣ اضغط "Add"\n\nسيظهر التطبيق على شاشتك الرئيسية كأي تطبيق عادي');
                };
            }, 3000);
        }

        installBtn && installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                banner.style.display = 'none';
            }
        });

        closeBtn && closeBtn.addEventListener('click', () => {
            banner.style.display = 'none';
        });

        // إخفاء البانر إذا التطبيق مثبت بالفعل
        if (isStandalone) {
            banner.style.display = 'none';
        }
    </script>
</body>
</html>

                    const merged = { ...local, ...data };
                    localStorage.setItem(DYNAMIC_ZONES_KEY, JSON.stringify(merged));
                    return merged;

            return loadDynamicZones();

        }

        // Helper function to get house type
        function getHouseType(zoneId, blockNumber, houseNumber) {
            const allZones = getAllZonesData();
            const zone = allZones[zoneId];
            if (!zone) return 'VY';
            
            const block = zone.blocks.find(b => b.number === blockNumber);
            if (!block || !block.types) return 'VY';
            
            for (const typeInfo of block.types) {
                if (typeInfo.from && typeInfo.to) {
                    if (houseNumber >= typeInfo.from && houseNumber <= typeInfo.to) {
                        return typeInfo.type;
                    }
                } else if (typeInfo.houses && typeInfo.houses.includes(houseNumber)) {
                    return typeInfo.type;
                }
            }
            
            return 'VY';
        }

                            if (parsed && parsed.data) {

                // Load from localStorage first
                const zoneData = localStorage.getItem(`mech_zone${this.zoneId}_data_v2`);
                const activityLog = localStorage.getItem(`mech_zone${this.zoneId}_activity_log_v2`);
                const editTimes = localStorage.getItem(`mech_zone${this.zoneId}_edit_times`);

                this.activityLog = activityLog ? JSON.parse(activityLog) : [];
                this.editTimes = editTimes ? JSON.parse(editTimes) : {};
                this.reportDraft = reportDraft ? JSON.parse(reportDraft) : null;
                this.reportHistory = reportHistory ? JSON.parse(reportHistory) : [];
                
                // Then sync from cloud
                await this.syncFromCloud();
            }

            async syncFromCloud() {

                            if (r && !localIds.has(r.id)) merged.push(r);
                            else if (r) {
                                // تحديث الطلب الموجود (حالة الفقرات)
                                const idx = merged.findIndex(x => x.id === r.id);
                                if (idx !== -1) merged[idx] = r;
                            }
                        }
                        localStorage.setItem(CLIENT_REQUESTS_KEY, JSON.stringify(merged));
                    }

                    const zoneKey = `zone${this.zoneId}`;
                    if (cloudData[zoneKey]) {
                        const cz = cloudData[zoneKey];
                        if (cz.data) this.data = { ...this.data, ...cz.data };
                        if (cz.activityLog) {
                            const arr = Array.isArray(cz.activityLog) ? cz.activityLog : Object.values(cz.activityLog);
                            const ts = new Set(this.activityLog.map(a => a.timestamp));
                            const nw = arr.filter(a => !ts.has(a.timestamp));
                            if (nw.length > 0) this.activityLog = [...nw, ...this.activityLog];
                        }
                        if (cz.editTimes) this.editTimes = { ...this.editTimes, ...cz.editTimes };
                        localStorage.setItem(`mech_zone${this.zoneId}_data_v2`, JSON.stringify(this.data));
                        localStorage.setItem(`mech_zone${this.zoneId}_activity_log_v2`, JSON.stringify(this.activityLog));
                        localStorage.setItem(`mech_zone${this.zoneId}_edit_times`, JSON.stringify(this.editTimes));
                        console.log(`✅ Synced zone ${this.zoneId} from Firebase`);

                    if (cloudData.reports) {
                        const arr = Array.isArray(cloudData.reports) ? cloudData.reports : Object.values(cloudData.reports);
                        const zr = arr.filter(r => r.zoneId === this.zoneId);
                        if (zr.length > 0) {
                            const ed = new Set(this.reportHistory.map(r => r.submittedAt));
                            const nr = zr.filter(r => !ed.has(r.submittedAt));
                            if (nr.length > 0) {

                            }

                    }
                    if (cloudData.approvalRequests) {
                        const arr = Array.isArray(cloudData.approvalRequests) ? cloudData.approvalRequests : Object.values(cloudData.approvalRequests);

                        const ids = new Set(local.map(r => r.id));
                        const nw = arr.filter(r => !ids.has(r.id));
                        if (nw.length > 0) localStorage.setItem('mech_approval_requests', JSON.stringify([...nw, ...local]));
                    }
                    if (cloudData.users && Array.isArray(cloudData.users) && cloudData.users.length > 0) {
                        const lu = JSON.parse(localStorage.getItem('elec_alfarah_users') || '[]');
                        if (cloudData.users.length >= lu.length) {
                            localStorage.setItem('elec_alfarah_users', JSON.stringify(cloudData.users));

            getStatus(blockId, houseId, department, taskId) {
                const key = `${blockId}-${houseId}-${department}-${taskId}`;
                return this.data[key] || 'not-started';
            }

            canEditDirectly(blockId, houseId, department, taskId) {
                return true;
            }

            updateStatus(blockId, houseId, department, taskId, newStatus, username, userRole) {
                const key = `${blockId}-${houseId}-${department}-${taskId}`;
                const oldStatus = this.data[key] || 'not-started';
                if (oldStatus === newStatus) return;

                // تحديد نوع التغيير
                // الحالات: not-started → in-progress → completed
                // التراجع الوحيد المقيّد: completed → أي شيء أقل
                const isCompletedRegression = (oldStatus === 'completed') && (newStatus !== 'completed');

                // الأدمن والمدير: يعدلون دائماً بدون موافقة
                if (userRole === 'admin' || userRole === 'manager') {
                    this.data[key] = newStatus;
                    this.editTimes[key] = new Date().getTime();
                    const adminActivity = {
                        timestamp: new Date().toISOString(),
                        timestampDisplay: new Date().toLocaleString('en-GB'),
                        username,
                        zoneName: this.getZoneData() ? this.getZoneData().name : '',
                        block: blockId,
                        house: houseId,
                        department: this.getDepartmentName(department),
                        task: this.getTaskName(department, taskId),
                        oldStatus, newStatus,
                        oldStatusText: this.getStatusText(oldStatus),
                        newStatusText: this.getStatusText(newStatus)
                    };
                    this.activityLog.unshift(adminActivity);
                    this.saveData();
                    cloudSync.logActivity(adminActivity);
                    return 'updated';
                }

                // الفورمن: التراجع من منجز يحتاج موافقة إلا في أول ساعة
                if (isCompletedRegression && userRole === 'foreman') {
                    const lastEditTime = this.editTimes[key] || 0;
                    const minutesSinceEdit = (new Date().getTime() - lastEditTime) / 60000;
                    if (minutesSinceEdit > 60) {
                        // تجاوز الساعة → يحتاج موافقة
                        const request = {
                            id: Date.now(),
                            timestamp: new Date().toISOString(),
                            timestampDisplay: new Date().toLocaleString('en-GB'),
                            username,
                            zoneName: this.getZoneData().name,
                            zoneId: this.zoneId,
                            block: blockId,
                            house: houseId,
                            department,
                            departmentName: this.getDepartmentName(department),
                            task: taskId,
                            taskName: this.getTaskName(department, taskId),
                            oldStatus,
                            newStatus,
                            oldStatusText: this.getStatusText(oldStatus),
                            newStatusText: this.getStatusText(newStatus),
                            reason: 'تراجع من منجز بعد مرور أكثر من ساعة - يحتاج موافقة المدير',
                            status: 'pending'
                        };
                        const requests = JSON.parse(localStorage.getItem('mech_approval_requests') || '[]');
                        requests.unshift(request);
                        localStorage.setItem('mech_approval_requests', JSON.stringify(requests));
                        cloudSync.logApprovalRequest(request);
                        return 'approval-needed';
                    }
                    // ضمن الساعة → يُسمح بدون موافقة، يكمل للتحديث
                }

                this.data[key] = newStatus;
                this.editTimes[key] = new Date().getTime();
                
                const activity = {
                    timestamp: new Date().toISOString(),
                    timestampDisplay: new Date().toLocaleString('en-GB'),
                    username,
                    zoneName: this.getZoneData().name,
                    block: blockId,
                    house: houseId,
                    department: this.getDepartmentName(department),
                    task: this.getTaskName(department, taskId),
                    oldStatus: oldStatus,
                    newStatus: newStatus,
                    oldStatusText: this.getStatusText(oldStatus),
                    newStatusText: this.getStatusText(newStatus)
                };
                
                this.activityLog.unshift(activity);
                this.saveData();
                
                console.log('✅ Activity saved:', activity);
                console.log('📊 Total activities in log:', this.activityLog.length);
                
                // Send to Cloud
                cloudSync.logActivity(activity);
                
                return 'success';
            }
            
            approveRequest(requestId) {
                const requests = JSON.parse(localStorage.getItem('mech_approval_requests') || '[]');
                const request = requests.find(r => r.id === requestId);
                
                if (!request) return false;
                
                // Apply the change على الزون الصحيح مباشرة في localStorage
                const key = `${request.block}-${request.house}-${request.department}-${request.task}`;
                const zId = request.zoneId || this.zoneId;
                const zoneDataKey = `mech_zone${zId}_data_v2`;
                const zoneTimesKey = `mech_zone${zId}_edit_times`;
                const zData = JSON.parse(localStorage.getItem(zoneDataKey) || '{}');
                const zTimes = JSON.parse(localStorage.getItem(zoneTimesKey) || '{}');
                zData[key] = request.newStatus;
                zTimes[key] = new Date().getTime();
                localStorage.setItem(zoneDataKey, JSON.stringify(zData));
                localStorage.setItem(zoneTimesKey, JSON.stringify(zTimes));
                // مزامنة Firebase
                cloudSync.saveZoneData(zId, { data: zData, editTimes: zTimes }).catch(()=>{});
                // تحديث this.data إذا نفس الزون
                if (zId == this.zoneId) {
                    this.data[key] = request.newStatus;
                    this.editTimes[key] = zTimes[key];
                }
                
                // Log activity
                const activity = {
                    timestamp: new Date().toISOString(),
                    timestampDisplay: new Date().toLocaleString('en-GB'),
                    username: request.username,
                    zoneName: request.zoneName,
                    block: request.block,
                    house: request.house,
                    department: request.departmentName,
                    task: request.taskName,
                    oldStatus: request.oldStatus,
                    newStatus: request.newStatus,
                    oldStatusText: request.oldStatusText,
                    newStatusText: request.newStatusText
                };
                
                this.activityLog.unshift(activity);
                this.saveData();
                
                // Update request status
                request.status = 'approved';
                request.approvedAt = new Date().toISOString();
                localStorage.setItem('mech_approval_requests', JSON.stringify(requests));
                
                cloudSync.logActivity(activity);
                
                return true;
            }
            
            rejectRequest(requestId, reason) {
                const requests = JSON.parse(localStorage.getItem('mech_approval_requests') || '[]');
                const request = requests.find(r => r.id === requestId);
                
                if (!request) return false;
                
                request.status = 'rejected';
                request.rejectedAt = new Date().toISOString();
                request.rejectionReason = reason;
                
                localStorage.setItem('mech_approval_requests', JSON.stringify(requests));
                
                return true;
            }
            
            getPendingRequests() {
                const requests = JSON.parse(localStorage.getItem('mech_approval_requests') || '[]');
                return requests.filter(r => r.status === 'pending');
            }
            
            getMyRequests(username) {
                const requests = JSON.parse(localStorage.getItem('mech_approval_requests') || '[]');
                return requests.filter(r => r.username === username);
            }

            getDepartmentName(deptKey) {
                const zoneData = this.getZoneData();
                return zoneData.departments[deptKey]?.name || deptKey;
            }

            getTaskName(department, taskId) {
                const zoneData = this.getZoneData();
                const dept = zoneData.departments[department];
                
                const task = dept.tasks.find(t => t.id === taskId);
                return task ? task.name : taskId;
            }

            getStatusText(status) {
                const statuses = {
                    'not-started': 'لم يبدأ',
                    'in-progress': 'قيد الإنجاز',
                    'completed': 'منجز'
                };
                return statuses[status] || status;
            }

            saveDraft(data) {
                this.reportDraft = {
                    ...data,
                    savedAt: new Date().toISOString()
                };
                localStorage.setItem(`mech_zone${this.zoneId}_daily_report_draft`, JSON.stringify(this.reportDraft));
            }

            submitReport(reportData) {
                // جلب التغييرات منذ آخر تقرير (مو من بداية اليوم)
                const lastReportTime = this.reportHistory.length > 0
                    ? new Date(this.reportHistory[0].submittedAt).getTime()
                    : (() => { const t = new Date(); t.setHours(0,0,0,0); return t.getTime(); })();
                
                const newChanges = reportData.changes || this.getChangesSince(lastReportTime);
                const report = {
                    ...reportData,
                    changes: newChanges,
                    totalChanges: newChanges.length,
                    zoneName: this.getZoneData().name,
                    zoneId: this.zoneId,
                    date: new Date().toLocaleDateString('en-GB'),
                    time: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                    submittedAt: new Date().toISOString()
                };

                this.reportHistory.unshift(report);
                localStorage.setItem(`mech_zone${this.zoneId}_report_history`, JSON.stringify(this.reportHistory));
                
                this.reportDraft = null;
                localStorage.removeItem(`mech_zone${this.zoneId}_daily_report_draft`);
                
                // Save to cloud
                cloudSync.logReport(report);
                
                return report;
            }

            isReportSubmittedToday() {
                if (this.reportHistory.length === 0) return false;
                
                const lastReport = this.reportHistory[0];
                const lastReportDate = new Date(lastReport.submittedAt);
                const today = new Date();
                
                return lastReportDate.toDateString() === today.toDateString();
            }

            // جلب التغييرات منذ وقت معين (افتراضي: بداية اليوم)
            getChangesSince(sinceTimestamp) {
                const since = sinceTimestamp || (() => {
                    const t = new Date(); t.setHours(0,0,0,0); return t.getTime();
                })();
                const tomorrow = new Date(); tomorrow.setHours(23,59,59,999);
                const tomorrowTimestamp = tomorrow.getTime();

                let allActivities = [...this.activityLog];
                for (const z of [1, 2, 5]) {
                    if (z !== this.zoneId) {
                        try {
                            const raw = localStorage.getItem(`mech_zone${z}_activity_log_v2`);
                            if (raw) allActivities = allActivities.concat(JSON.parse(raw));
                        } catch(e) {}
                    }
                }

                const filtered = allActivities.filter(a => {
                    const t = new Date(a.timestamp).getTime();
                    return t >= since && t <= tomorrowTimestamp;
                });
                const seen = new Set();
                return filtered.filter(a => {
                    const k = `${a.block}-${a.house}-${a.task}-${a.timestamp}`;
                    if (seen.has(k)) return false;
                    seen.add(k); return true;
                });
            }

            getTodayChanges() {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const todayTimestamp = today.getTime();
                
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowTimestamp = tomorrow.getTime();
                
                // جلب كل تغييرات اليوم من كل الزونات
                let allActivities = [...this.activityLog];
                
                // جلب من الزونات الأخرى أيضاً
                for (const z of [1, 2, 5]) {
                    if (z !== this.zoneId) {
                        try {
                            const raw = localStorage.getItem(`mech_zone${z}_activity_log_v2`);
                            if (raw) allActivities = allActivities.concat(JSON.parse(raw));
                        } catch(e) {}
                    }
                }
                
                const filtered = allActivities.filter(activity => {
                    const activityTime = new Date(activity.timestamp).getTime();
                    return activityTime >= todayTimestamp && activityTime < tomorrowTimestamp;
                });
                
                // إزالة المكررات
                const seen = new Set();
                const unique = filtered.filter(a => {
                    const k = `${a.timestamp}-${a.block}-${a.house}-${a.task}`;
                    if (seen.has(k)) return false;
                    seen.add(k);
                    return true;
                });
                
                const deduplicated = unique;
                console.log('📊 getTodayChanges - إجمالي التغييرات اليوم:', deduplicated.length);
                return deduplicated;
            }
        }

                // Load from localStorage first
                const saved = localStorage.getItem('elec_alfarah_users_v2');
                if (saved) {
                    this.users = JSON.parse(saved);
                } else {

                            role: 'admin',

                        }
                    ];

                // Sync from cloud

            }
            
            async syncFromCloud() {
                try {
                    console.log('🔄 Syncing users from cloud...');
                    const cloudData = await cloudSync.syncData();
                    console.log('☁️ Cloud data received:', cloudData ? 'Yes' : 'No');
                    
                    if (cloudData && cloudData.users) {
                        console.log('👥 Cloud users count:', cloudData.users.length);
                        console.log('👥 Cloud users:', cloudData.users.map(u => u.username));
                        
                        // Replace all users with cloud users (except admin)
                        const admin = this.users.find(u => u.username === 'ali');
                        const cloudUsers = cloudData.users.filter(u => u.username !== 'ali');
                        
                        this.users = admin ? [admin, ...cloudUsers] : cloudUsers;
                        
                        localStorage.setItem('elec_alfarah_users_v2', JSON.stringify(this.users));
                        console.log('✅ Users synced from cloud:', this.users.length);
                        console.log('👥 Available usernames:', this.users.map(u => u.username));
                    } else {
                        console.log('⚠️ No users in cloud, using local only');
                    }
                } catch (error) {
                    console.error('❌ Error syncing users from cloud:', error);
                }
            }

            saveUsers() {
                localStorage.setItem('elec_alfarah_users_v2', JSON.stringify(this.users));
                console.log('💾 Saving users to cloud...');
                console.log('👥 Users to save:', this.users.length);
                // Also save to cloud
                cloudSync.saveUsers(this.users);
            }
            
            // Export users as shareable code
            exportUsersCode() {
                const data = btoa(unescape(encodeURIComponent(JSON.stringify(this.users))));
                return data;
            }
            
            // Import users from code
            importUsersCode(code) {
                try {
                    const users = JSON.parse(decodeURIComponent(escape(atob(code))));
                    // Keep admin, merge others
                    const admin = this.users.find(u => u.username === 'ali');
                    const importedUsers = users.filter(u => u.username !== 'ali');
                    
                    this.users = admin ? [admin, ...importedUsers] : importedUsers;
                    localStorage.setItem('elec_alfarah_users_v2', JSON.stringify(this.users));
                    
                    return { success: true, count: importedUsers.length };
                } catch (error) {
                    console.error('Import error:', error);
                    return { success: false, message: 'كود غير صحيح' };
                }
            }

            authenticate(username, password) {
                return this.users.find(u => u.username === username && u.password === password);
            }

            addUser(userData) {
                const newUser = {
                    id: Date.now(),
                    ...userData
                };
                this.users.push(newUser);
                this.saveUsers();
                return newUser;
            }

            updatePassword(userId, newPassword) {
                const user = this.users.find(u => u.id === userId);
                if (user) {
                    user.password = newPassword;
                    this.saveUsers();
                    return true;
                }
                return false;
            }

            deleteUser(userId) {
                this.users = this.users.filter(u => u.id !== userId);
                this.saveUsers();
            }

            getVisibleUsers() {
                return this.users.filter(u => !u.hidden);
            }
        }

        // ==================== Main App ====================
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [currentZone, setCurrentZone] = useState(null);
            const [currentView, setCurrentView] = useState('departments');
            const [selectedDepartment, setSelectedDepartment] = useState(null);
            const [selectedTask, setSelectedTask] = useState(null);
            const [selectedBlock, setSelectedBlock] = useState(null);
            const [showSearch, setShowSearch] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [showUserManagement, setShowUserManagement] = useState(false);
            const [showApprovals, setShowApprovals] = useState(false);
            const [showZoneManagement, setShowZoneManagement] = useState(false);
            const [showPriceSettings, setShowPriceSettings] = useState(false);
            const [showContractors, setShowContractors] = useState(false);
            const [showSalafTasks, setShowSalafTasks] = useState(false);
            const [zoneMode, setZoneMode] = useState(null); // null | 'work' | 'requests'
            const [showClientRequests, setShowClientRequests] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);

            useEffect(() => {
                // جلب طلبات الزبائن من Firebase عند التحميل
                cloudSync.fbGet('alfarah_mech/client_requests').then(data => {
                    if (data) {
                        const arr = Array.isArray(data) ? data : Object.values(data);
                        const local = getClientRequests();
                        const localIds = new Set(local.map(r => r.id));
                        const merged = [...local];
                        for (const r of arr) {
                            if (r && !localIds.has(r.id)) merged.push(r);
                            else if (r) {
                                const idx = merged.findIndex(x => x.id === r.id);
                                if (idx !== -1) merged[idx] = r;
                            }
                        }
                        localStorage.setItem(CLIENT_REQUESTS_KEY, JSON.stringify(merged));
                    }
                }).catch(() => {});
            }, []);

            useEffect(() => {
                if (currentZone) {
                    setIsSyncing(true);
                    dataManager.setZone(currentZone).then(() => {
                        setTimeout(() => {
                            setIsSyncing(false);
                            setSelectedDepartment('mechanical');
                            setCurrentView('tasks');
                        }, 500);
                    });
                }
            }, [currentZone]);

            useEffect(() => {
                if (!currentZone) return;
                const syncInterval = setInterval(async () => {
                    try { await dataManager.syncFromCloud(); } catch (e) {}
                }, 30000);
                return () => clearInterval(syncInterval);
            }, [currentZone]);



            if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;

            if (!currentZone) {
                let availableZones = null;
                if (currentUser.role === 'manager') {
                    if (currentUser.assignedZones && currentUser.assignedZones.length > 0) {
                        availableZones = currentUser.assignedZones;
                    } else if (currentUser.assignedZone) {
                        availableZones = [currentUser.assignedZone];
                    }
                } else if (currentUser.role === 'foreman') {
                    if (currentUser.assignedZones && currentUser.assignedZones.length > 0) {
                        availableZones = currentUser.assignedZones;
                    } else if (currentUser.assignedZone) {
                        availableZones = [currentUser.assignedZone];
                    }
                }
                return (
                    <>
                        <ZoneSelection
                            onSelectZone={setCurrentZone}
                            availableZones={availableZones}
                            currentUser={currentUser}
                            onLogout={() => setCurrentUser(null)}
                            onShowReport={() => setShowReport(true)}
                            onShowUserManagement={() => setShowUserManagement(true)}
                            onShowApprovals={() => setShowApprovals(true)}
                            onShowZoneManagement={() => setShowZoneManagement(true)}
                            onShowPriceSettings={() => setShowPriceSettings(true)}
                            onShowContractors={() => setShowContractors(true)}
                            onShowSalafTasks={() => setShowSalafTasks(true)}
                        />
                        {showReport && <ReportModal currentUser={currentUser} onClose={() => setShowReport(false)} />}
                        {showUserManagement && <UserManagementModal currentUser={currentUser} onClose={() => setShowUserManagement(false)} />}
                        {showApprovals && <ApprovalModal currentUser={currentUser} onClose={() => setShowApprovals(false)} />}
                        {showZoneManagement && currentUser.role === 'admin' && <ZoneManagementModal onClose={() => setShowZoneManagement(false)} />}
                        {showPriceSettings && currentUser.role === 'admin' && <PriceSettingsModal onClose={() => setShowPriceSettings(false)} />}
                        {showContractors && currentUser.role === 'admin' && <ContractorsModal onClose={() => setShowContractors(false)} />}
                        {showSalafTasks && currentUser.role === 'admin' && <SalafTasksModal onClose={() => setShowSalafTasks(false)} />}
                    </>
                );
            }

            const zoneData = getAllZonesData()[currentZone];
            const pendingCount = dataManager.getPendingRequests().length;

            // شاشة اختيار الوضع
            if (!zoneMode) {
                return (
                    <ZoneModeSelector
                        zoneData={zoneData}
                        currentUser={currentUser}
                        onSelectWork={() => {
                            setZoneMode('work');
                            setSelectedDepartment('mechanical');
                            setCurrentView('tasks');
                        }}
                        onSelectRequests={() => setZoneMode('requests')}
                        onSelectSalaf={() => setZoneMode('salaf')}
                        onBack={() => { setCurrentZone(null); setZoneMode(null); }}
                    />
                );
            }

            // شاشة طلبات الزبائن
            if (zoneMode === 'requests') {
                return (
                    <ClientRequestsView
                        zoneData={zoneData}
                        currentUser={currentUser}
                        onBack={() => setZoneMode(null)}
                    />
                );
            }

            // شاشة السلف
            if (zoneMode === 'salaf') {
                return (
                    <SalafView
                        currentUser={currentUser}
                        onBack={() => setZoneMode(null)}
                    />
                );
            }

            const handleBackToZones = () => {
                setZoneMode(null);
                setSelectedDepartment(null);
                setSelectedTask(null);
                setSelectedBlock(null);
                setSidebarOpen(false);
            };

            const handleBackToDepartments = () => {
                setZoneMode(null);
                setSelectedDepartment(null);
                setSelectedTask(null);
                setSelectedBlock(null);
                setSidebarOpen(false);
            };

            const handleBackToTasks = () => {
                setCurrentView('tasks');
                setSelectedTask(null);
                setSelectedBlock(null);
            };

            const handleBackToBlocks = () => {
                setCurrentView('blocks');
                setSelectedBlock(null);
            };

            // تحديد دالة الرجوع المناسبة
            const getBackAction = () => {
                if (currentView === 'houses') return handleBackToBlocks;
                if (currentView === 'blocks') return handleBackToTasks;
                if (currentView === 'tasks') return handleBackToZones;
                return handleBackToZones;
            };

            return (
                <div className="min-h-screen" style={{ paddingTop: 80 }}>
                    {/* Syncing Overlay */}
                    {isSyncing && (
                        <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-[2000]">
                            <div className="bg-gray-800 p-8 rounded-lg text-center">
                                <div className="flex justify-center mb-4">
                                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-yellow-500"></div>
                                </div>
                                <h3 className="text-xl font-bold text-white">جاري المزامنة...</h3>
                            </div>
                        </div>
                    )}

                    {/* زر AL الذهبي */}
                    <button className="al-logo-btn no-print" onClick={() => setSidebarOpen(true)}>AL</button>

                    {/* زر الرجوع */}
                    <button className="back-nav-btn no-print" onClick={getBackAction()}>
                        ←
                    </button>

                    {/* Sidebar Overlay */}
                    <div
                        className={`sidebar-overlay ${sidebarOpen ? 'active' : ''}`}
                        onClick={() => setSidebarOpen(false)}
                    />

                    {/* Sidebar */}
                    <div className={`sidebar-panel ${sidebarOpen ? 'open' : ''}`}>
                        <div className="sidebar-header-section">
                            <div style={{ color: 'var(--primary-gold)', fontWeight: 900, fontSize: 13, letterSpacing: 1 }}>AL</div>
                        </div>

                        <div className="sidebar-item" onClick={() => { setSelectedDepartment('mechanical'); setCurrentView('tasks'); setSidebarOpen(false); }}>
                            <span className="s-icon">🏠</span>
                            <span className="s-label">رئيسية</span>
                        </div>

                        <div className="sidebar-item" onClick={() => { setShowSearch(true); setSidebarOpen(false); }}>
                            <span className="s-icon">🔍</span>
                            <span className="s-label">بحث</span>
                        </div>

                        {(currentUser.role === 'admin' || currentUser.role === 'manager') && (
                            <div className="sidebar-item" onClick={() => { setShowReport(true); setSidebarOpen(false); }}>
                                <span className="s-icon">📊</span>
                                <span className="s-label">تقارير</span>
                            </div>
                        )}

                        {(currentUser.role === 'admin' || currentUser.role === 'manager' || currentUser.role === 'foreman') && (
                            <div className="sidebar-item" onClick={() => { setShowApprovals(true); setSidebarOpen(false); }}>
                                <span className="s-icon">{currentUser.role === 'admin' ? '✋' : '📝'}</span>
                                <span className="s-label">{currentUser.role === 'admin' ? 'الطلبات' : 'طلباتي'}</span>
                                {currentUser.role === 'admin' && pendingCount > 0 && (
                                    <span className="sidebar-badge">{pendingCount}</span>
                                )}
                            </div>
                        )}

                        {(currentUser.role === 'admin' || currentUser.role === 'manager') && (
                            <div className="sidebar-item" onClick={() => { setShowUserManagement(true); setSidebarOpen(false); }}>
                                <span className="s-icon">👥</span>
                                <span className="s-label">مستخدمين</span>
                            </div>
                        )}

                        {currentUser.role === 'admin' && (
                            <div className="sidebar-item" onClick={() => { setShowZoneManagement(true); setSidebarOpen(false); }}>
                                <span className="s-icon">🏗️</span>
                                <span className="s-label">إدارة الزونات</span>
                            </div>
                        )}

                        <div className="sidebar-item" onClick={handleBackToZones}>
                            <span className="s-icon">🗺️</span>
                            <span className="s-label">الزونات</span>
                        </div>

                        <div style={{ marginTop: 'auto' }}>
                            <div className="sidebar-item" style={{ color: '#ef4444' }} onClick={() => setCurrentUser(null)}>
                                <span className="s-icon">🚪</span>
                                <span className="s-label" style={{ color: '#ef4444' }}>خروج</span>
                            </div>
                        </div>
                    </div>

                    {/* المحتوى */}
                    <div className="container mx-auto px-4 py-6">
                        {currentView === 'departments' && (
                            <DepartmentsView
                                zoneData={zoneData}
                                currentUser={currentUser}
                                onSelectDepartment={(dept) => {
                                    setSelectedDepartment(dept);
                                    setCurrentView('tasks');
                                }}
                            />
                        )}
                        {currentView === 'tasks' && (
                            <TasksView
                                zoneData={zoneData}
                                department={selectedDepartment}
                                currentUser={currentUser}
                                onSelectTask={(task) => {
                                    setSelectedTask(task);
                                    setCurrentView('blocks');
                                }}
                                onBack={handleBackToDepartments}

                        )}
                        {currentView === 'blocks' && (
                            <BlocksView
                                zoneData={zoneData}
                                department={selectedDepartment}
                                task={selectedTask}
                                currentUser={currentUser}
                                onSelectBlock={(block) => {
                                    setSelectedBlock(block);
                                    setCurrentView('houses');
                                }}
                                onBack={handleBackToTasks}
                            />
                        )}
                        {currentView === 'houses' && (

                                block={selectedBlock}
                                department={selectedDepartment}
                                task={selectedTask}
                                currentUser={currentUser}
                                onBack={handleBackToBlocks}
                            />
                        )}
                    </div>

                    {showSearch && <SearchModal zoneData={zoneData} onClose={() => setShowSearch(false)} />}
                    {showReport && <ReportModal currentUser={currentUser} onClose={() => setShowReport(false)} />}
                    {showUserManagement && <UserManagementModal currentUser={currentUser} onClose={() => setShowUserManagement(false)} />}
                    {showApprovals && <ApprovalModal currentUser={currentUser} onClose={() => setShowApprovals(false)} />}
                    {showZoneManagement && currentUser.role === 'admin' && <ZoneManagementModal onClose={() => setShowZoneManagement(false)} />}
                        {showPriceSettings && currentUser.role === 'admin' && <PriceSettingsModal onClose={() => setShowPriceSettings(false)} />}
                        {showContractors && currentUser.role === 'admin' && <ContractorsModal onClose={() => setShowContractors(false)} />}
                        {showSalafTasks && currentUser.role === 'admin' && <SalafTasksModal onClose={() => setShowSalafTasks(false)} />}
                </div>
            );
        }


        // ==================== Client Requests Storage ====================
        const CLIENT_REQUESTS_KEY = 'mech_client_requests';

        function getClientRequests() {
            try { return JSON.parse(localStorage.getItem(CLIENT_REQUESTS_KEY) || '[]'); } catch(e) { return []; }
        }

        function saveClientRequests(requests) {
            localStorage.setItem(CLIENT_REQUESTS_KEY, JSON.stringify(requests));
            // مزامنة مع Firebase
            cloudSync.fbSet('alfarah_mech/client_requests', requests).catch(e => {
                console.error('❌ Error saving client requests to Firebase:', e);
            });
        }

        function getHouseRequests(zoneId, blockNumber, houseNumber) {
            return getClientRequests().filter(r =>
                r.zoneId === zoneId && r.block === blockNumber && r.house === houseNumber
            );
        }

        function houseHasRequest(zoneId, blockNumber, houseNumber) {
            return getClientRequests().some(r =>
                r.zoneId === zoneId && r.block === blockNumber && r.house === houseNumber
            );
        }

        // ==================== Zone Mode Selector ====================
        function ZoneModeSelector({ zoneData, currentUser, onSelectWork, onSelectRequests, onSelectSalaf, onBack }) {
            const totalRequests = getClientRequests().filter(r => r.zoneId === zoneData.id).length;

            return (
                <div className="min-h-screen flex items-center justify-center p-4" style={{paddingTop: 80}}>

                    <div className="w-full max-w-md">

                            <p className="text-gray-400">اختر القسم</p>
                        </div>

                            {/* الأعمال */}
                            <button onClick={onSelectWork}
                                className="group bg-gray-800 rounded-2xl p-8 border-2 border-yellow-500 border-opacity-40 hover:border-opacity-100 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 text-right">
                                <div className="flex items-center gap-5">
                                    <div className="w-16 h-16 rounded-xl flex items-center justify-center text-4xl flex-shrink-0"
                                        style={{backgroundColor:'rgba(234,179,8,0.15)'}}>
                                        ⚡
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold text-white mb-1">الأعمال</h3>
                                        <p className="text-gray-400 text-sm">متابعة وتسجيل تقدم الأعمال الكهربائية</p>
                                    </div>
                                </div>
                            </button>

                            {/* طلبات الزبائن */}
                            <button onClick={onSelectRequests}
                                className="group bg-gray-800 rounded-2xl p-8 border-2 border-blue-500 border-opacity-40 hover:border-opacity-100 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 text-right">
                                <div className="flex items-center gap-5">
                                    <div className="w-16 h-16 rounded-xl flex items-center justify-center text-4xl flex-shrink-0 relative"
                                        style={{backgroundColor:'rgba(59,130,246,0.15)'}}>
                                        📋
                                        {totalRequests > 0 && (
                                            <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">
                                                {totalRequests}
                                            </span>
                                        )}
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold text-white mb-1">طلبات الزبائن</h3>
                                        <p className="text-gray-400 text-sm">تسجيل وعرض تغييرات الوحدات السكنية</p>
                                        {totalRequests > 0 && (
                                            <p className="text-blue-400 text-xs mt-1 font-bold">{totalRequests} طلب مسجل</p>
                                        )}
                                    </div>
                                </div>
                            </button>

        // ==================== Salaf Storage ====================
        const SALAF_KEY = 'mech_salaf_data';

        const DEFAULT_SALAF_TASKS = [
            { id: "sewage_raft",      name: "مجاري الرفت" },
            { id: "sewage_ground",    name: "مجاري سقف الأرضي" },
            { id: "sewage_first",     name: "مجاري سقف الأول" },
            { id: "sewage_ceiling",   name: "مجاري التعليق" },
            { id: "ppr",              name: "أعمال PPR" },
            { id: "distillation",     name: "أعمال التقطير" },
            { id: "garage_sewage",    name: "ربط مجاري الكراج" },
            { id: "testing",          name: "أعمال الفحص" }
        ];

        const SALAF_TASKS_KEY = 'mech_salaf_tasks';

        function getSalafTasks() {
            try {
                const saved = localStorage.getItem(SALAF_TASKS_KEY);
                return saved ? JSON.parse(saved) : DEFAULT_SALAF_TASKS;
            } catch(e) { return DEFAULT_SALAF_TASKS; }
        }

        function saveSalafTasks(tasks) {
            localStorage.setItem(SALAF_TASKS_KEY, JSON.stringify(tasks));
            cloudSync.fbSet('alfarah_mech/salaf_tasks', tasks).catch(()=>{});
        }

        Object.defineProperty(window, 'SALAF_TASKS', { get: getSalafTasks });

        function getSalafData() {
            try { return JSON.parse(localStorage.getItem(SALAF_KEY) || '{}'); } catch(e) { return {}; }
        }

        function getNextIRNo() {
            const key = 'mech_ir_counter';
            const current = parseInt(localStorage.getItem(key) || '0') + 1;
            localStorage.setItem(key, String(current));
            cloudSync.fbSet('alfarah_mech/ir_counter', current).catch(()=>{});
            return current;
        }

        function getNextSalafNo() {
            const key = 'mech_salaf_counter';
            const current = parseInt(localStorage.getItem(key) || '0') + 1;
            localStorage.setItem(key, String(current));
            cloudSync.fbSet('alfarah_mech/salaf_counter', current).catch(()=>{});
            return current;
        }

        // حجز رقم السلفة مرتبط بـ IR - ما يتكرر
        function reserveSalafNo(irNo) {
            const key = `elec_salaf_for_ir_${irNo}`;
            const existing = localStorage.getItem(key);
            if (existing) return { no: parseInt(existing), isNew: false };
            const no = getNextSalafNo();
            localStorage.setItem(key, String(no));
            cloudSync.fbSet(`alfarah_mech/salaf_for_ir/${irNo}`, no).catch(()=>{});
            return { no, isNew: true };
        }

        function saveSalafData(data) {
            localStorage.setItem(SALAF_KEY, JSON.stringify(data));
            // مزامنة مع Firebase
            cloudSync.fbSet('alfarah_mech/salaf', data).catch(e => {
                console.error('❌ Error saving salaf to Firebase:', e);
            });
        }

        // key: zoneId_block_house_taskId
        function getSalafKey(zoneId, block, house, taskId) {
            return `${zoneId}_${block}_${house}_${taskId}`;
        }

        function getSalafStatus(zoneId, block, house, taskId) {
            const data = getSalafData();
            return data[getSalafKey(zoneId, block, house, taskId)] || { salaf: false, tamin: false };
        }

        function setSalafStatus(zoneId, block, house, taskId, salaf, tamin) {
            const data = getSalafData();
            data[getSalafKey(zoneId, block, house, taskId)] = { salaf, tamin };
            saveSalafData(data);
        }

        // ==================== Salaf View ====================
        function SalafView({ currentUser, onBack }) {
            const [selectedTask, setSelectedTask] = useState(null);
            const [, forceUpdate] = useState(0);
            const allZones = getAllZonesData();
            const [selectedHouses, setSelectedHouses] = useState({}); // key: zoneId_block_house
            const [showSalafModal, setShowSalafModal] = useState(false);
            const [showArchive, setShowArchive] = useState(false);

            // جلب الأسعار والمقاولين والسلف من Firebase
            useEffect(() => {
                const loadAll = () => {
                    cloudSync.fbGet('alfarah_mech/prices_settings').then(data => {
                        if (data && typeof data === 'object') localStorage.setItem(PRICES_KEY, JSON.stringify(data));
                    }).catch(() => {});
                    cloudSync.fbGet('alfarah_mech/contractors').then(data => {
                        if (data && Array.isArray(data)) localStorage.setItem(CONTRACTORS_KEY, JSON.stringify(data));
                    }).catch(() => {});
                    cloudSync.fbGet('alfarah_mech/salaf').then(data => {
                        if (data && typeof data === 'object') localStorage.setItem(SALAF_KEY, JSON.stringify(data));
                    }).catch(() => {});
                    cloudSync.fbGet('alfarah_mech/salaf_archive').then(data => {
                        if (data && Array.isArray(data)) localStorage.setItem('mech_salaf_archive', JSON.stringify(data));
                    }).catch(() => {});
                    forceUpdate(n => n + 1);
                };
                loadAll();
                const interval = setInterval(loadAll, 20000);
                return () => clearInterval(interval);
            }, []);

            // جلب من Firebase عند الفتح
            useEffect(() => {
                cloudSync.fbGet('alfarah_mech/salaf').then(data => {
                    if (data && typeof data === 'object') {
                        const local = getSalafData();
                        const merged = { ...data, ...local };
                        // last-write-wins: نعطي الأولوية للسحابة للبيانات الأحدث
                        const final = { ...local, ...data };
                        localStorage.setItem(SALAF_KEY, JSON.stringify(final));
                        forceUpdate(n => n + 1);
                    }
                }).catch(() => {});
            }, []);

            const canEdit = currentUser.role === 'admin' || currentUser.role === 'manager';

            const handleHouseClick = (zoneId, block, house, taskId) => {
                if (!canEdit) return; // فقط الأدمن والمدير
                const current = getSalafStatus(zoneId, block, house, taskId);
                if (!current.salaf) {
                    // صرف السلفة (مرة واحدة فقط - لا رجعة) → أخضر + دائرة صفراء
                    setSalafStatus(zoneId, block, house, taskId, true, false);
                } else if (!current.tamin) {
                    // صرف التأمينات → تختفي الدائرة الصفراء نهائياً
                    setSalafStatus(zoneId, block, house, taskId, true, true);
                }
                // لا يوجد تراجع - السلفة تُصرف مرة واحدة
                forceUpdate(n => n + 1);
            };

            const printSalafStatement = (housesMap, task, isTamin = false) => {
                const houses = Object.values(housesMap);
                const settings = getPricesSettings();
                const today = new Date();
                const dateStr = `${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}`;

                const counterKey = isTamin ? 'mech_tamin_counter' : 'mech_salaf_counter';
                const seqNo = parseInt(localStorage.getItem(counterKey) || '0') + 1;
                localStorage.setItem(counterKey, String(seqNo));

                const taminTotal = Math.round(total * 0.10);

                const displayTotal = isTamin ? taminTotal : total; // المبلغ الكامل بدون خصم

                // حفظ في الأرشيف
                const archiveKey = 'mech_salaf_archive';

                    id: Date.now(),

                    taskId: task.id,
                    taskName: task.name,

                    houses: rows.map(r => ({ zoneId: r.zoneId, block: r.block, house: r.house, hType: r.hType, amount: r.rowAmount })),
                    total: displayTotal
                });
                localStorage.setItem(archiveKey, JSON.stringify(archive.slice(0, 200)));
                cloudSync.fbSet('alfarah_mech/salaf_archive', archive.slice(0, 200)).catch(()=>{});

                // تحديث حالة البيوت
                houses.forEach(h => {
                    if (isTamin) {
                        setSalafStatus(h.zoneId, h.block, h.house, task.id, true, true);

                        setSalafStatus(h.zoneId, h.block, h.house, task.id, true, false);
                    }
                });
                forceUpdate(n => n + 1);

                        <td style="text-align:center">${r.zoneId}</td>
                        <td style="text-align:center">${r.block}</td>
                        <td style="text-align:center">${r.house} (${r.hType})</td>
                    </tr>`).join('');

                const emptyRows = Array(Math.max(0, 8 - rows.length)).fill(`
                    <tr style="height:26px"><td></td><td></td><td></td><td></td><td></td><td></td></tr>`).join('');

                const pw = window.open('', '_blank');
                pw.document.write(`<!DOCTYPE html>

        const CONTRACTORS_KEY = 'mech_contractors';

        function getContractors() {
            try { return JSON.parse(localStorage.getItem(CONTRACTORS_KEY) || '[]'); }
            catch(e) { return []; }
        }

        function saveContractors(list) {
            localStorage.setItem(CONTRACTORS_KEY, JSON.stringify(list));
            cloudSync.fbSet('alfarah_mech/contractors', list).catch(function(){});
        }

        function getContractorForHouse(zoneId, block, house, taskId) {
            const contractors = getContractors();
            // تحويل لأرقام للمقارنة الصحيحة
            const zId = Number(zoneId);
            const blk = Number(block);
            const hs = Number(house);
            for (var i = 0; i < contractors.length; i++) {
                var c = contractors[i];
                if (!c.tasks || !c.tasks.includes(taskId)) continue;
                if (!c.houses) continue;
                for (var j = 0; j < c.houses.length; j++) {
                    var h = c.houses[j];
                    if (Number(h.zoneId) === zId && Number(h.block) === blk && Number(h.house) === hs) {
                        return c;
                    }
                }
            }
            return null;
        }

        // ==================== Salaf Tasks Manager ====================
        function SalafTasksModal({ onClose }) {
            const [tasks, setTasks] = React.useState(getSalafTasks);
            const [editingId, setEditingId] = React.useState(null);
            const [newName, setNewName] = React.useState('');
            const [editName, setEditName] = React.useState('');

            React.useEffect(function() {
                cloudSync.fbGet('alfarah_mech/salaf_tasks').then(function(data) {
                    if (data && Array.isArray(data)) {
                        localStorage.setItem(SALAF_TASKS_KEY, JSON.stringify(data));
                        setTasks(data);
                    }
                }).catch(function(){});
            }, []);

            const addTask = function() {
                if (!newName.trim()) return;
                const updated = [...tasks, { id: 'task_' + Date.now(), name: newName.trim() }];
                saveSalafTasks(updated);
                setTasks(updated);
                setNewName('');
            };

            const deleteTask = function(id) {
                if (!window.confirm('حذف هذه الفقرة؟')) return;
                const updated = tasks.filter(function(t){ return t.id !== id; });
                saveSalafTasks(updated);
                setTasks(updated);
            };

            const saveEdit = function() {
                if (!editName.trim()) return;
                const updated = tasks.map(function(t){ return t.id === editingId ? {...t, name: editName.trim()} : t; });
                saveSalafTasks(updated);
                setTasks(updated);
                setEditingId(null);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50">
                    <div className="bg-gray-800 rounded-xl w-full max-w-md max-h-screen overflow-y-auto">
                        <div className="sticky top-0 bg-gray-800 p-4 border-b border-gray-700 flex items-center justify-between">
                            <h3 className="text-lg font-bold text-white">📋 إدارة فقرات السلف</h3>
                            <button onClick={onClose} className="text-white text-3xl hover:text-red-500">×</button>
                        </div>
                        <div className="p-4 space-y-3">
                            <div className="flex gap-2">
                                <input value={newName} onChange={function(e){setNewName(e.target.value);}}
                                    onKeyDown={function(e){if(e.key==='Enter')addTask();}}
                                    placeholder="اسم الفقرة الجديدة..."
                                    className="flex-1 px-3 py-2 bg-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" />
                                <button onClick={addTask} className="px-4 py-2 rounded-lg font-bold text-gray-900"
                                    style={{backgroundColor:'var(--primary-gold)'}}>➕</button>
                            </div>
                            {tasks.map(function(task, idx) {
                                return (
                                    <div key={task.id} className="bg-gray-700 rounded-lg p-3 flex items-center gap-2">
                                        <span className="text-gray-400 text-sm w-6">{idx+1}</span>
                                        {editingId === task.id ? (
                                            <input value={editName} onChange={function(e){setEditName(e.target.value);}}
                                                onKeyDown={function(e){if(e.key==='Enter')saveEdit();}}
                                                className="flex-1 px-2 py-1 bg-gray-600 text-white rounded focus:outline-none" autoFocus />
                                        ) : (
                                            <span className="flex-1 text-white">{task.name}</span>
                                        )}
                                        <div className="flex gap-1">
                                            {editingId === task.id ? (
                                                <>
                                                    <button onClick={saveEdit} className="px-3 py-1 rounded text-xs font-bold bg-green-700 text-white">✓</button>
                                                    <button onClick={function(){setEditingId(null);}} className="px-3 py-1 rounded text-xs font-bold bg-gray-600 text-white">✕</button>
                                                </>
                                            ) : (
                                                <>
                                                    <button onClick={function(){setEditingId(task.id);setEditName(task.name);}} className="px-3 py-1 rounded text-xs font-bold bg-blue-700 text-white">✏️</button>
                                                    <button onClick={function(){deleteTask(task.id);}} className="px-3 py-1 rounded text-xs font-bold bg-red-800 text-white">🗑️</button>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== Price Settings ====================
        const PRICES_KEY = 'mech_prices_settings';

        function getPricesSettings() {
            try { return JSON.parse(localStorage.getItem(PRICES_KEY) || '{"houseTypes":[],"taskPrices":{}}'); }
            catch(e) { return { houseTypes: [], taskPrices: {} }; }
        }

        function savePricesSettings(data) {
            localStorage.setItem(PRICES_KEY, JSON.stringify(data));
            cloudSync.fbSet('alfarah_mech/prices_settings', data).catch(() => {});
        }

        function getPriceForHouse(houseType, taskId) {
            const settings = getPricesSettings();
            return settings.taskPrices?.[taskId]?.[houseType] || 0;
        }

        function PriceSettingsModal({ onClose }) {
            const [settings, setSettings] = useState(getPricesSettings);
            const [newTypeName, setNewTypeName] = useState('');

            const addHouseType = () => {
                if (!newTypeName.trim()) return;
                if (settings.houseTypes.includes(newTypeName.trim())) return;
                const updated = {
                    ...settings,
                    houseTypes: [...settings.houseTypes, newTypeName.trim()]
                };
                setSettings(updated);
                savePricesSettings(updated);
                setNewTypeName('');
            };

            const removeHouseType = (type) => {
                const updated = { ...settings, houseTypes: settings.houseTypes.filter(t => t !== type) };
                setSettings(updated);
                savePricesSettings(updated);
            };

            const updatePrice = (taskId, houseType, value) => {
                const num = parseInt(value.replace(/,/g, '')) || 0;
                const updated = {
                    ...settings,
                    taskPrices: {
                        ...settings.taskPrices,
                        [taskId]: { ...(settings.taskPrices[taskId] || {}), [houseType]: num }
                    }
                };
                setSettings(updated);
                savePricesSettings(updated);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
                    <div className="bg-gray-800 rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-gray-800 p-4 border-b border-gray-700 flex items-center justify-between">
                            <h3 className="text-xl font-bold text-white">💲 إعدادات الأسعار</h3>
                            <button onClick={onClose} className="text-white text-3xl hover:text-red-500">×</button>
                        </div>
                        <div className="p-5 space-y-6">

                            {/* إضافة نوع دار */}
                            <div>
                                <h4 className="text-white font-bold mb-3">أنواع الدور</h4>
                                <div className="flex gap-2 mb-3">
                                    <input
                                        value={newTypeName}
                                        onChange={e => setNewTypeName(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && addHouseType()}
                                        placeholder="اسم النوع (مثال: VK، DK)"
                                        className="flex-1 px-4 py-2 bg-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500"
                                    />
                                    <button onClick={addHouseType}
                                        className="px-5 py-2 rounded-lg font-bold text-gray-900"
                                        style={{backgroundColor:'var(--primary-gold)'}}>
                                        ➕ إضافة
                                    </button>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {settings.houseTypes.map(type => (
                                        <div key={type} className="flex items-center gap-2 bg-gray-700 px-3 py-1 rounded-full">
                                            <span className="text-white font-bold">{type}</span>
                                            <button onClick={() => removeHouseType(type)} className="text-red-400 hover:text-red-300 text-lg leading-none">×</button>
                                        </div>
                                    ))}
                                    {settings.houseTypes.length === 0 && (
                                        <p className="text-gray-500 text-sm">لا توجد أنواع - أضف نوعاً أولاً</p>
                                    )}
                                </div>
                            </div>

                            {/* جدول الأسعار */}
                            {settings.houseTypes.length > 0 && (
                                <div>
                                    <h4 className="text-white font-bold mb-3">الأسعار (بالدينار)</h4>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="bg-gray-700">
                                                    <th className="text-right p-3 text-white">الفقرة</th>
                                                    {settings.houseTypes.map(type => (
                                                        <th key={type} className="p-3 text-center text-yellow-400">{type}</th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {SALAF_TASKS.map((task, i) => (
                                                    <tr key={task.id} className={i % 2 === 0 ? 'bg-gray-750' : 'bg-gray-800'}>
                                                        <td className="p-3 text-white font-medium">{task.name}</td>
                                                        {settings.houseTypes.map(type => (
                                                            <td key={type} className="p-2">
                                                                <input
                                                                    type="number"
                                                                    value={settings.taskPrices?.[task.id]?.[type] || ''}
                                                                    onChange={e => updatePrice(task.id, type, e.target.value)}
                                                                    placeholder="0"
                                                                    className="w-full px-2 py-2 bg-gray-600 text-white rounded text-center focus:outline-none focus:ring-2 focus:ring-yellow-500"
                                                                />
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            <button onClick={onClose}
                                className="w-full py-3 rounded-lg font-bold text-gray-900"
                                style={{backgroundColor:'var(--primary-gold)'}}>
                                ✅ حفظ وإغلاق
                            </button>
                        </div>
                    </div>
                </div>
            );
        }



        // ==================== Salaf Archive View ====================
        function SalafArchiveView({ onBack, currentUser, onReset }) {
            const [archive, setArchive] = React.useState([]);
            const [filter, setFilter] = React.useState('all');
            const isAdmin = currentUser && currentUser.role === 'admin';

            const loadArchive = () => {
                const local = JSON.parse(localStorage.getItem('mech_salaf_archive') || '[]');
                setArchive(local);
            };

            React.useEffect(() => {
                cloudSync.fbGet('alfarah_mech/salaf_archive').then(function(data) {
                    if (data && Array.isArray(data)) {
                        localStorage.setItem('mech_salaf_archive', JSON.stringify(data));
                        setArchive(data);
                    } else {
                        loadArchive();
                    }
                }).catch(function() { loadArchive(); });
            }, []);

            const deleteItem = (id) => {
                if (!window.confirm('تأكيد حذف هذه الوثيقة من الأرشيف؟')) return;
                const updated = archive.filter(function(r) { return r.id !== id; });
                localStorage.setItem('mech_salaf_archive', JSON.stringify(updated));
                cloudSync.fbSet('alfarah_mech/salaf_archive', updated).catch(function(){});
                setArchive(updated);
            };

            const resetHouses = (item) => {
                if (!window.confirm('إرجاع هذه الدور لحالة غير مصروف؟\nسيتم حذف الوثيقة من الأرشيف أيضاً.')) return;
                if (!item.houses || !item.taskId) return;
                // إرجاع كل الدور
                item.houses.forEach(function(h) {
                    if (item.type === 'tamin') {
                        setSalafStatus(h.zoneId, h.block, h.house, item.taskId, true, false);
                    } else {
                        setSalafStatus(h.zoneId, h.block, h.house, item.taskId, false, false);
                    }
                });
                // حذف من الأرشيف
                const updated = archive.filter(function(r) { return r.id !== item.id; });
                localStorage.setItem('mech_salaf_archive', JSON.stringify(updated));
                cloudSync.fbSet('alfarah_mech/salaf_archive', updated).catch(function(){});
                cloudSync.fbSet('alfarah_mech/salaf', getSalafData()).catch(function(){});
                setArchive(updated);
                if (onReset) onReset();
                alert('✅ تم الإرجاع وحذف الوثيقة');
            };

            const filtered = filter === 'all' ? archive : archive.filter(function(r) { return r.type === filter; });

            return (
                <div className="min-h-screen p-4" style={{paddingTop: 80}}>
                    <button className="al-logo-btn no-print" onClick={onBack}>AL</button>
                    <div className="max-w-3xl mx-auto">
                        <h2 className="text-2xl font-bold text-white mb-6">📁 أرشيف السلف والتأمينات</h2>
                        <div className="flex gap-2 mb-6 flex-wrap">
                            {['all','salaf','tamin'].map(function(v) {
                                const labels = {all:'الكل', salaf:'سلف', tamin:'تأمينات'};
